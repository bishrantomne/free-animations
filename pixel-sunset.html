<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="title" content="Pixel Sunset Beach">
<meta name="description" content="Animated pixel art beach scene with rolling waves, drifting clouds, birds, crabs, jellyfish, and bioluminescent ocean. Includes a day/night toggle that smoothly transitions the full scene.">
<meta name="category" content="Scenes">
<meta name="tags" content="pixel,beach,sunset,ocean,waves,day-night,canvas,animation,nature,clouds">
<title>Pixel Sunset Beach</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    min-height: 100vh;
    background: #0d0d14;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
  }
  .scene-wrap {
    width: min(896px, 96vw);
  }
</style>
</head>
<body>
<div class="scene-wrap">
<div style="padding: 1rem 0; position: relative;">
  <canvas id="beach" width="480" height="280"
    style="width: 100%; height: auto; image-rendering: pixelated; image-rendering: crisp-edges; display: block; border-radius: 12px; background: #3A4368;">
  </canvas>
  <button id="dnToggle" aria-label="Toggle day and night" style="
    position: absolute; top: calc(1rem + 12px); right: 12px;
    width: 44px; height: 44px;
    background: rgba(15, 22, 42, 0.72);
    border: 1.5px solid rgba(255, 250, 220, 0.45);
    border-radius: 50%;
    color: rgba(255, 235, 175, 0.95);
    font: 20px/1 system-ui, sans-serif;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    user-select: none; padding: 0;
    backdrop-filter: blur(6px);
    transition: background 0.4s, color 0.4s, transform 0.15s;
    z-index: 10;
  "><span id="dnIcon">☀</span></button>
</div>
<script>
(function() {
  const canvas = document.getElementById('beach');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const S = 2;
  const W = 240 * S, H = 140 * S;

  const C = {
    sky1:'#3F4F8F', sky2:'#5B5F9E', sky3:'#7F70AE', sky4:'#A77DB5',
    sky5:'#D89BBE', sky6:'#F2BFCB', sky7:'#F8D7C8',
    sun:'#FBE89E', sunCore:'#FFF6CC',
    oceanD:'#1A4C7E', oceanM:'#216898', oceanML:'#2A85B5', oceanL:'#3CA5D0',
    foam:'#FFFFFF', foamM:'#EFF7FB', foamS:'#D8EFF8', foamD:'#A8D0E5', foamE:'#82BFD8',
    washW:'#36C0D5', washM:'#66CEE0', washL:'#A0DBE8',
    wetDeep:'#82533F', wetMid:'#9A6856', wetSand:'#B58270', wetDry:'#C99478',
    bird:'#3A2F4A'
  };

  const NIGHT = {
    foam:'#C0D4E8', foamM:'#A4B8D0', foamS:'#7888A8', foamD:'#4A6080', foamE:'#304664',
    washW:'#1F3C58', washM:'#2C4870', washL:'#3D5C84',
    wetDeep:'#1A1F32', wetMid:'#262B45', wetSand:'#323858', wetDry:'#3F4568'
  };

  // --- OPTIMIZED COLOR MIXING ---
  // Pre-parse all day/night hex constants once
  function parseHex(h) {
    return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
  }
  const _PD = { foam:parseHex(C.foam), foamM:parseHex(C.foamM), foamS:parseHex(C.foamS),
                foamD:parseHex(C.foamD), foamE:parseHex(C.foamE),
                washW:parseHex(C.washW), washM:parseHex(C.washM), washL:parseHex(C.washL),
                wetDeep:parseHex(C.wetDeep), wetMid:parseHex(C.wetMid),
                wetSand:parseHex(C.wetSand), wetDry:parseHex(C.wetDry) };
  const _PN = { foam:parseHex(NIGHT.foam), foamM:parseHex(NIGHT.foamM), foamS:parseHex(NIGHT.foamS),
                foamD:parseHex(NIGHT.foamD), foamE:parseHex(NIGHT.foamE),
                washW:parseHex(NIGHT.washW), washM:parseHex(NIGHT.washM), washL:parseHex(NIGHT.washL),
                wetDeep:parseHex(NIGHT.wetDeep), wetMid:parseHex(NIGHT.wetMid),
                wetSand:parseHex(NIGHT.wetSand), wetDry:parseHex(NIGHT.wetDry) };
  const _hex2 = (n) => (n < 16 ? '0' : '') + n.toString(16);
  function mixParsed(a, b, k) {
    return '#' +
      _hex2(Math.round(a[0] + (b[0]-a[0])*k)) +
      _hex2(Math.round(a[1] + (b[1]-a[1])*k)) +
      _hex2(Math.round(a[2] + (b[2]-a[2])*k));
  }
  // Pre-built endpoint arrays (referenced when nightLevel is exactly 0 or 1)
  const DAY_FOAM  = [C.foam, C.foamM, C.foamS, C.foamD, C.foamE];
  const NIGHT_FOAM = [NIGHT.foam, NIGHT.foamM, NIGHT.foamS, NIGHT.foamD, NIGHT.foamE];
  const DAY_WASH  = [C.washW, C.washM, C.washL];
  const NIGHT_WASH = [NIGHT.washW, NIGHT.washM, NIGHT.washL];
  const DAY_WET   = [C.wetDeep, C.wetMid, C.wetSand, C.wetDry];
  const NIGHT_WET  = [NIGHT.wetDeep, NIGHT.wetMid, NIGHT.wetSand, NIGHT.wetDry];

  // --- OPTIMIZED BAYER LOOKUP ---
  const _bayer = [[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]];
  const bayerFlat = new Float32Array(16);
  for (let i = 0; i < 4; i++) for (let j = 0; j < 4; j++) bayerFlat[(i<<2)|j] = (_bayer[i][j] + 0.5) / 16;
  const TH = (y, x) => bayerFlat[((y & 3) << 2) | (x & 3)];

  function sandNoise(x, y) {
    return Math.sin(x * 0.155 + y * 0.135 + 0.5) * 0.40
         + Math.sin(x * 0.065 - y * 0.205 + 1.2) * 0.30
         + Math.sin(x * 0.355 + y * 0.295 + 2.3) * 0.20
         + Math.sin(x * 0.565 - y * 0.415 + 3.4) * 0.15;
  }
  function macroNoise(x, y) {
    return Math.sin(x * 0.035 + y * 0.025 + 1.7) * 0.6
         + Math.sin(x * 0.020 - y * 0.030 + 0.3) * 0.5;
  }

  // --- OPTIMIZED FILLSTYLE CACHE ---
  let _curFill = null;
  function setFill(c) {
    if (c !== _curFill) { ctx.fillStyle = c; _curFill = c; }
  }

  let t = 0;
  let nightLevel = 0;
  let targetNight = 0;

  const button = document.getElementById('dnToggle');
  const icon = document.getElementById('dnIcon');
  button.addEventListener('click', () => {
    targetNight = 1 - targetNight;
    icon.textContent = targetNight ? '☾' : '☀';
    button.style.background = targetNight ? 'rgba(40, 35, 70, 0.75)' : 'rgba(15, 22, 42, 0.72)';
    button.style.color = targetNight ? 'rgba(220, 220, 245, 0.95)' : 'rgba(255, 235, 175, 0.95)';
  });
  button.addEventListener('mousedown', () => { button.style.transform = 'scale(0.92)'; });
  button.addEventListener('mouseup', () => { button.style.transform = 'scale(1)'; });
  button.addEventListener('mouseleave', () => { button.style.transform = 'scale(1)'; });

  function buildCloud(w, h, palette) {
    const c = document.createElement('canvas');
    c.width = w * 4 + 10; c.height = h * 4 + 10;
    const cc = c.getContext('2d');
    cc.imageSmoothingEnabled = false;
    const cx = c.width / 2, cy = c.height / 2;
    const blobs = [
      [0, 0, w, h * 0.9],
      [-w*0.8, h*0.3, w*0.7, h*0.5],
      [w*0.75, h*0.35, w*0.6, h*0.45],
      [-w*0.35, -h*0.55, w*0.55, h*0.5],
      [w*0.4, -h*0.5, w*0.5, h*0.45],
      [-w*0.1, h*0.5, w*0.45, h*0.4]
    ];
    let minY = Infinity, maxY = -Infinity;
    for (const [,dy,,ry] of blobs) {
      if (dy - ry < minY) minY = dy - ry;
      if (dy + ry > maxY) maxY = dy + ry;
    }
    const totalH = maxY - minY;
    const edgePad = Math.ceil(Math.max(w, h) * 0.5);
    for (let py = Math.floor(minY) - edgePad; py <= Math.ceil(maxY) + edgePad; py++) {
      for (let px = -Math.ceil(w * 1.8) - edgePad; px <= Math.ceil(w * 1.8) + edgePad; px++) {
        let minD = Infinity;
        for (const [dx,dy,rx,ry] of blobs) {
          const ex = (px-dx)/rx, ey = (py-dy)/ry;
          const d = ex*ex + ey*ey;
          if (d < minD) minD = d;
        }
        let density;
        if (minD <= 0.80) density = 1.0;
        else if (minD <= 1.00) density = 0.90 - (minD - 0.80) / 0.20 * 0.30;
        else if (minD <= 1.25) density = 0.48 - (minD - 1.00) / 0.25 * 0.35;
        else if (minD <= 1.55) density = 0.13 - (minD - 1.25) / 0.30 * 0.13;
        else continue;
        const ax = Math.floor(cx + px);
        const ay = Math.floor(cy + py);
        if (ax < 0 || ax >= c.width || ay < 0 || ay >= c.height) continue;
        const th = TH(ay, ax);
        if (density <= th) continue;
        const r = (py - minY) / totalH;
        let col;
        if (r < 0.18) col = palette[0];
        else if (r < 0.40) col = palette[1];
        else if (r < 0.62) col = palette[2];
        else if (r < 0.85) col = palette[3];
        else col = palette[4];
        cc.fillStyle = col;
        cc.fillRect(ax, ay, 1, 1);
      }
    }
    return c;
  }

  function buildFogCloud(w, h, palette) {
    const cw = Math.ceil(w * 3.5) + 10;
    const ch = Math.ceil(h * 3) + 4;
    const c = document.createElement('canvas');
    c.width = cw; c.height = ch;
    const cc = c.getContext('2d');
    cc.imageSmoothingEnabled = false;
    const cx = cw / 2, cy = ch / 2;
    const blobs = [
      [0, 0, w * 1.0, h * 0.5],
      [-w * 0.85, h * 0.15, w * 0.7, h * 0.35],
      [w * 0.85, h * 0.1, w * 0.7, h * 0.35],
      [-w * 0.4, -h * 0.3, w * 0.55, h * 0.3],
      [w * 0.45, -h * 0.25, w * 0.5, h * 0.28],
      [w * 0.1, h * 0.3, w * 0.4, h * 0.25]
    ];
    let minY = Infinity, maxY = -Infinity;
    for (const [,dy,,ry] of blobs) {
      if (dy - ry < minY) minY = dy - ry;
      if (dy + ry > maxY) maxY = dy + ry;
    }
    const totalH = maxY - minY;
    for (let py = Math.floor(minY) - 1; py <= Math.ceil(maxY) + 1; py++) {
      for (let px = -Math.ceil(w * 2); px <= Math.ceil(w * 2); px++) {
        let minD = Infinity;
        for (const [dx, dy, rx, ry] of blobs) {
          const ex = (px - dx) / rx, ey = (py - dy) / ry;
          const d = ex * ex + ey * ey;
          if (d < minD) minD = d;
        }
        let density;
        if (minD <= 0.6) density = 0.90;
        else if (minD <= 1.0) density = 0.55;
        else if (minD <= 1.5) density = 0.22;
        else if (minD <= 2.2) density = 0.08;
        else continue;
        const ax = Math.floor(cx + px);
        const ay = Math.floor(cy + py);
        if (ax < 0 || ax >= cw || ay < 0 || ay >= ch) continue;
        const th = TH(ay, ax);
        if (density > th) {
          const r = (py - minY) / totalH;
          let col;
          if (r < 0.3) col = palette[0];
          else if (r < 0.65) col = palette[1];
          else col = palette[2];
          cc.fillStyle = col;
          cc.fillRect(ax, ay, 1, 1);
        }
      }
    }
    return c;
  }

  function buildCloudMask(spriteCanvas) {
    const sCtx2 = spriteCanvas.getContext('2d');
    const data = sCtx2.getImageData(0, 0, spriteCanvas.width, spriteCanvas.height).data;
    const mask = new Uint8Array(spriteCanvas.width);
    for (let x = 0; x < spriteCanvas.width; x++) {
      for (let y = 0; y < spriteCanvas.height; y++) {
        const idx = (y * spriteCanvas.width + x) * 4;
        if (data[idx + 3] > 0) { mask[x] = 1; break; }
      }
    }
    return mask;
  }

  function buildGradientCanvas(width, height, yOffset, colors) {
    const c = document.createElement('canvas');
    c.width = width; c.height = height;
    const cc = c.getContext('2d');
    cc.imageSmoothingEnabled = false;
    for (let y = 0; y < height; y++) {
      const gp = (y / (height - 1)) * (colors.length - 1);
      const idx = Math.floor(gp);
      const frac = gp - idx;
      for (let x = 0; x < width; x++) {
        const th = TH(y + yOffset, x);
        const ci = (frac > th) ? Math.min(idx + 1, colors.length - 1) : idx;
        cc.fillStyle = colors[ci];
        cc.fillRect(x, y, 1, 1);
      }
    }
    return c;
  }

  function buildSandCanvas(colors, dampColors, yOffset, height) {
    const c = document.createElement('canvas');
    c.width = W; c.height = height;
    const cc = c.getContext('2d');
    cc.imageSmoothingEnabled = false;
    for (let y = 0; y < height; y++) {
      for (let x = 0; x < W; x++) {
        const globalY = y + yOffset;
        const baseGp = (y / (height - 1)) * (colors.length - 1);
        const noise = sandNoise(x, globalY);
        const gp = Math.max(0, Math.min(colors.length - 1.001, baseGp + noise * 0.7));
        const idx = Math.floor(gp);
        const frac = gp - idx;
        const th = TH(globalY, x);
        const ci = (frac > th) ? Math.min(idx + 1, colors.length - 1) : idx;
        cc.fillStyle = colors[ci];
        cc.fillRect(x, y, 1, 1);
      }
    }
    const dampRows = 9 * S;
    for (let y = 0; y < Math.min(dampRows, height); y++) {
      for (let x = 0; x < W; x++) {
        const globalY = y + yOffset;
        const fade = 1 - y / dampRows;
        const macN = macroNoise(x, globalY);
        const fineN = sandNoise(x, globalY) * 0.5;
        const dampIntensity = macN + fineN + fade * 0.5 - 0.2;
        const th = TH(globalY, x);
        let col = null;
        if (dampIntensity > 0.85 && th < 0.65) col = dampColors[0];
        else if (dampIntensity > 0.55 && th < 0.55) col = dampColors[1];
        else if (dampIntensity > 0.35 && th < 0.30 && fade > 0.3) col = dampColors[2];
        if (col) { cc.fillStyle = col; cc.fillRect(x, y, 1, 1); }
      }
    }
    return c;
  }

  const SKY_H = 60 * S;
  const sunX = 120 * S, sunY = 54 * S;
  const moonX = 200 * S, moonY = 16 * S;
  const daySkyColors = [C.sky1, C.sky2, C.sky3, C.sky4, C.sky5, C.sky6, C.sky7];
  const daySkyCanvas = buildGradientCanvas(W, SKY_H, 0, daySkyColors);
  const dsCtx = daySkyCanvas.getContext('2d');
  dsCtx.imageSmoothingEnabled = false;
  const haloColors = [C.sunCore, C.sun, '#FCE0BC', C.sky7, C.sky6];
  const haloRx = 28 * S, haloRy = 17 * S;
  for (let py = -haloRy; py <= haloRy; py++) {
    const ay = sunY + py;
    if (ay < 0 || ay >= SKY_H) continue;
    for (let px = -haloRx; px <= haloRx; px++) {
      const ax = sunX + px;
      if (ax < 0 || ax >= W) continue;
      const ex = px / haloRx, ey = py / haloRy;
      const d = Math.sqrt(ex*ex + ey*ey);
      if (d > 1) continue;
      const th = TH(ay, ax);
      if (d > 0.78) { const fade = (d - 0.78) / 0.22; if (fade > th) continue; }
      const dNorm = Math.min(d / 0.78, 1);
      const gp = dNorm * (haloColors.length - 1);
      const idx = Math.floor(gp);
      const frac = gp - idx;
      const ci = (frac > th) ? Math.min(idx + 1, haloColors.length - 1) : idx;
      dsCtx.fillStyle = haloColors[ci];
      dsCtx.fillRect(ax, ay, 1, 1);
    }
  }
  const sunRy = 7 * S, sunRx = 8 * S;
  for (let py = -sunRy; py <= sunRy; py++) {
    const ay = sunY + py;
    if (ay < 0 || ay >= SKY_H) continue;
    for (let px = -sunRx; px <= sunRx; px++) {
      const ax = sunX + px;
      if (ax < 0 || ax >= W) continue;
      const d = Math.sqrt((px*px)/((6*S)*(6*S)) + (py*py)/((5*S)*(5*S)));
      if (d > 1.3) continue;
      const th = TH(ay, ax);
      if (d <= 0.35) { dsCtx.fillStyle = C.sunCore; dsCtx.fillRect(ax, ay, 1, 1); }
      else if (d <= 0.55) { dsCtx.fillStyle = (th < 0.35) ? C.sunCore : C.sun; dsCtx.fillRect(ax, ay, 1, 1); }
      else if (d <= 0.85) { dsCtx.fillStyle = C.sun; dsCtx.fillRect(ax, ay, 1, 1); }
      else if (d <= 1.0) { if ((d - 0.85) / 0.15 < th) { dsCtx.fillStyle = C.sun; dsCtx.fillRect(ax, ay, 1, 1); } }
      else { if ((d - 1.0) / 0.3 < th * 0.55) { dsCtx.fillStyle = C.sun; dsCtx.fillRect(ax, ay, 1, 1); } }
    }
  }
  const nightSkyColors = ['#080C1E', '#0E1530', '#161F40', '#202A52', '#2C3868', '#3F4778', '#52507E'];
  const nightSkyCanvas = buildGradientCanvas(W, SKY_H, 0, nightSkyColors);
  const nsCtx = nightSkyCanvas.getContext('2d');
  nsCtx.imageSmoothingEnabled = false;
  const moonHaloColors = ['#F4ECD0', '#C0B8A0', '#7A7C9E', '#42467A', '#2C3868'];
  const moonHaloRx = 22 * S, moonHaloRy = 18 * S;
  for (let py = -moonHaloRy; py <= moonHaloRy; py++) {
    const ay = moonY + py;
    if (ay < 0 || ay >= SKY_H) continue;
    for (let px = -moonHaloRx; px <= moonHaloRx; px++) {
      const ax = moonX + px;
      if (ax < 0 || ax >= W) continue;
      const ex = px / moonHaloRx, ey = py / moonHaloRy;
      const d = Math.sqrt(ex*ex + ey*ey);
      if (d > 1) continue;
      const th = TH(ay, ax);
      if (d > 0.70) { const fade = (d - 0.70) / 0.30; if (fade > th) continue; }
      const dNorm = Math.min(d / 0.70, 1);
      const gp = dNorm * (moonHaloColors.length - 1);
      const idx = Math.floor(gp);
      const frac = gp - idx;
      const ci = (frac > th) ? Math.min(idx + 1, moonHaloColors.length - 1) : idx;
      nsCtx.fillStyle = moonHaloColors[ci];
      nsCtx.fillRect(ax, ay, 1, 1);
    }
  }
  const moonRx = 9 * S, moonRy = 8 * S;
  for (let py = -moonRy - 1; py <= moonRy + 1; py++) {
    const ay = moonY + py;
    if (ay < 0 || ay >= SKY_H) continue;
    for (let px = -moonRx - 1; px <= moonRx + 1; px++) {
      const ax = moonX + px;
      if (ax < 0 || ax >= W) continue;
      const d = Math.sqrt((px*px)/((7*S)*(7*S)) + (py*py)/((6.5*S)*(6.5*S)));
      if (d > 1.2) continue;
      const th = TH(ay, ax);
      if (d <= 0.40) { nsCtx.fillStyle = '#FCF8E8'; nsCtx.fillRect(ax, ay, 1, 1); }
      else if (d <= 0.65) { nsCtx.fillStyle = (th < 0.4) ? '#FCF8E8' : '#E8E0C8'; nsCtx.fillRect(ax, ay, 1, 1); }
      else if (d <= 0.88) { nsCtx.fillStyle = '#D8D0B8'; nsCtx.fillRect(ax, ay, 1, 1); }
      else if (d <= 1.02) { nsCtx.fillStyle = (th < 0.5) ? '#D8D0B8' : '#B8AC98'; nsCtx.fillRect(ax, ay, 1, 1); }
      else { if ((d - 1.02) / 0.18 < th * 0.7) { nsCtx.fillStyle = '#988C78'; nsCtx.fillRect(ax, ay, 1, 1); } }
    }
  }
  for (const [cx, cy] of [[-3,-1],[2,-2],[1,2],[-2,3],[3,1]]) {
    nsCtx.fillStyle = '#A89C84';
    nsCtx.fillRect(moonX + cx*S, moonY + cy*S, S, S);
  }

  const stars = [];
  (function seedStars() {
    let seed = 12345;
    const rand = () => { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; };
    for (let i = 0; i < 110; i++) {
      const ySample = Math.pow(rand(), 1.6);
      const sx = Math.floor(rand() * W);
      const sy = Math.floor(ySample * (SKY_H - 6*S));
      const dxm = sx - moonX, dym = sy - moonY;
      if (Math.sqrt(dxm*dxm + dym*dym) < 26*S) continue;
      stars.push({ x: sx, y: sy, bright: 0.3 + rand() * 0.7, twinkPhase: rand() * 6.28, twinkSpeed: 0.018 + rand() * 0.05 });
    }
  })();

  const bioluminescent = [];
  (function seedBio() {
    let seed = 67890;
    const rand = () => { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; };
    for (let i = 0; i < 38; i++) {
      bioluminescent.push({
        x: rand() * W,
        y: 63*S + rand() * 32*S,
        baseBright: 0.35 + rand() * 0.65,
        twinkPhase: rand() * 6.28,
        twinkSpeed: 0.020 + rand() * 0.045,
        driftSpeed: 0.012 + rand() * 0.025,
        driftDir: rand() > 0.5 ? 1 : -1,
        colorVar: rand(),
        yWobPhase: rand() * 6.28
      });
    }
  })();

  function updateBio() {
    for (const p of bioluminescent) {
      p.x += p.driftSpeed * p.driftDir * (0.6 + Math.sin(t * 0.006 + p.twinkPhase) * 0.4);
      if (p.x < -2) p.x += W + 4;
      if (p.x >= W + 2) p.x -= W + 4;
    }
  }

  function drawBio(alpha) {
    if (alpha < 0.05) return;
    ctx.globalAlpha = alpha;
    for (const p of bioluminescent) {
      const phasedT = t * p.twinkSpeed + p.twinkPhase;
      const twRaw = (Math.sin(phasedT) + 1) / 2;

  const oceanColors = [C.oceanD, C.oceanM, C.oceanML, C.oceanL];

  const dayOceanCanvas = buildGradientCanvas(W, 39 * S, 60 * S, oceanColors);

  const daySandColors = ['#B58270', '#C99478', '#D8A488', '#E5B5A0', '#F2C8B5'];
  const dayDampColors = [C.wetDeep, C.wetMid, '#A77460'];

  const nightDampColors = ['#222230', '#2D2D3C', '#3E3D4C'];
  const SAND_Y = 115 * S;
  const daySandCanvas = buildSandCanvas(daySandColors, dayDampColors, SAND_Y, H - SAND_Y);

  function addImperfections(canvas, palette) {
    const cc = canvas.getContext('2d');

      const px = Math.floor(Math.abs(Math.sin(i * 7.1 + 0.5)) * W);
      const py = Math.floor(Math.abs(Math.sin(i * 11.3 + 1.7)) * canvas.height);

  addImperfections(nightSandCanvas, ['#2E2D38', '#8A8898', '#3A3848', '#7A7888']);

  // --- WET SAND NOISE LUT ---
  // sandNoise(x,y)*0.4 + macroNoise(x,y)*0.6 is purely position-based; precompute it.
  const WET_LUT_Y_MIN = 96 * S;
  const WET_LUT_ROWS = SAND_Y - WET_LUT_Y_MIN;

  for (let y = 0; y < WET_LUT_ROWS; y++) {

    for (let x = 0; x < W; x++) {

  }

  const dayCloudPal = ['#6E4B7C', '#9D6FA0', '#D087B0', '#F4B0CE', '#FFEEEE'];
  const nightCloudPal = ['#7B82A8', '#5D6488', '#454D6E', '#2F3656', '#1A223C'];
  const dayFogPal = ['#7F6FA8', '#A089B5', '#C9A0BD'];
  const nightFogPal = ['#5E658A', '#3F4768', '#262E48'];
  const cloudSpecs = [
    {w: 22*S, h: 8*S, y: 4*S,  speed: 0.030*S, offset: 0},
    {w: 11*S, h: 4*S, y: 16*S, speed: 0.055*S, offset: 80*S},
    {w: 17*S, h: 6*S, y: 24*S, speed: 0.035*S, offset: 140*S},
    {w: 9*S,  h: 3*S, y: 8*S,  speed: 0.065*S, offset: 205*S},
    {w: 19*S, h: 7*S, y: 32*S, speed: 0.028*S, offset: 250*S}
  ];
  const fogCloudSpecs = [
    {w: 28*S, h: 5*S, y: 12*S, speed: 0.018*S, offset: 40*S},
    {w: 22*S, h: 4*S, y: 28*S, speed: 0.022*S, offset: 130*S},
    {w: 32*S, h: 5*S, y: 20*S, speed: 0.015*S, offset: 200*S},
    {w: 20*S, h: 4*S, y: 38*S, speed: 0.020*S, offset: 280*S}

  function buildCloudSet(specs, palette, isFog) {
    return specs.map(s => {

  }
  const dayClouds = buildCloudSet(cloudSpecs, dayCloudPal, false);
  const nightClouds = buildCloudSet(cloudSpecs, nightCloudPal, false);
  const dayFogClouds = buildCloudSet(fogCloudSpecs, dayFogPal, true);
  const nightFogClouds = buildCloudSet(fogCloudSpecs, nightFogPal, true);
  // Pre-built reflection iteration arrays (avoid per-frame spread)

  const nightAllClouds = nightFogClouds.concat(nightClouds);

  const jellies = [
    {baseX: 50*S,  baseY: 78*S, phase: 0,    color: 'cyan'},
    {baseX: 145*S, baseY: 84*S, phase: 1.7,  color: 'teal'},
    {baseX: 245*S, baseY: 76*S, phase: 3.4,  color: 'cyan'},
    {baseX: 340*S, baseY: 82*S, phase: 5.1,  color: 'teal'},
    {baseX: 420*S, baseY: 79*S, phase: 0.8,  color: 'cyan'}
  ];

  function drawBird(x, y, frame, big) {
    x = Math.floor(x); y = Math.floor(y);
    setFill(C.bird);
    const blk = (px, py) => ctx.fillRect(px, py, S, S);
    if (!big) {
      if (frame === 0) { blk(x-S, y); blk(x, y); blk(x+S, y); }
      else { blk(x-S, y+S); blk(x, y); blk(x+S, y+S); }
    } else {
      if (frame === 0) { blk(x-2*S, y-S); blk(x-S, y); blk(x, y); blk(x+S, y); blk(x+2*S, y-S); }
      else if (frame === 1) { blk(x-2*S, y); blk(x-S, y); blk(x, y); blk(x+S, y); blk(x+2*S, y); }
      else { blk(x-2*S, y+S); blk(x-S, y+S); blk(x, y); blk(x+S, y+S); blk(x+2*S, y+S); }

  }
  function reflectionRow(cx, y, halfW, col, solidThresh) {

      const ax = cx + dx;
      if (ax < 0 || ax >= W) continue;
      const intensity = 1 - Math.abs(dx) / (halfW + 1);
      const th = TH(y, ax);
      if (intensity > solidThresh) { setFill(col); ctx.fillRect(ax, y, 1, 1); }
      else if (intensity > 0.05 && intensity > th * 0.55) { setFill(col); ctx.fillRect(ax, y, 1, 1); }
    }
  }
  const ROCKS = { tiny: ['LMD','.DD'], small: ['.LMD','LMMD','.DDD'], med: ['..LMD.','.LMMMD','LMMMMD','.DDDDD'] };
  const rockList = [['med', 24*S, 122*S], ['tiny', 32*S, 129*S], ['small', 78*S, 131*S], ['small', 140*S, 127*S], ['tiny', 147*S, 130*S], ['med', 200*S, 124*S]];
  function drawRocks() {

  }
  const crabs = [

    {x: 215*S, y: 135*S, dir: 1, frame: 0, moveC: 3, speed: 16, minX: 207*S, maxX: 228*S}

  }
  function drawCrabs() {

      setFill('#C44434'); ctx.fillRect(x+2*S, y, S, S); ctx.fillRect(x, y+S, 5*S, S);

  }

    }
  }
  function drawParticles() {
    for (const p of particles) {
      const lr = p.age / p.maxAge;

      if (lr < 0.15) alpha = lr / 0.15;
      else if (lr > 0.85) alpha = (1 - lr) / 0.15;

  }

  function drawStars(alpha) {
    if (alpha <= 0.02) return;

    }

  }

  function drawJellies(alpha) {
    if (alpha <= 0.02) return;
    const baseAlpha = alpha * 0.65;
    for (const j of jellies) {
      const yOff = Math.sin(t * 0.014 + j.phase) * 3 * S;
      const xOff = Math.sin(t * 0.011 + j.phase * 1.3) * 2 * S;

      const x = Math.floor(j.baseX + xOff);
      const y = Math.floor(j.baseY + yOff);
      let G, H, Cc, T, Halo;
      if (j.color === 'cyan') { G = '#60D8C0'; H = '#80F0D8'; Cc = '#A8FFEC'; T = '#60D8C0'; Halo = '#388A78'; }
      else { G = '#5078B8'; H = '#70A0D0'; Cc = '#A0D8F0'; T = '#5078B8'; Halo = '#28507A'; }

      ctx.globalAlpha = baseAlpha * 0.85;

          if (ch === 'G') col = G;
          else if (ch === 'H') col = H;
          else if (ch === 'C') col = Cc;

  }

  function drawDayNightOverlay(dayCanvas, nightCanvas, y) {
    if (nightLevel === 0) {

    } else if (nightLevel === 1) {
      ctx.drawImage(nightCanvas, 0, y);
    } else {
      ctx.drawImage(dayCanvas, 0, y);

      ctx.drawImage(nightCanvas, 0, y);
      ctx.globalAlpha = 1;
    }
  }

  function draw() {
    if (nightLevel < targetNight) nightLevel = Math.min(targetNight, nightLevel + 0.012);
    else if (nightLevel > targetNight) nightLevel = Math.max(targetNight, nightLevel - 0.012);
    const dayLevel = 1 - nightLevel;

    // --- OPTIMIZED PALETTE COMPUTATION ---
    let foamCur, washCur, wetCur;
    if (nightLevel === 0) {
      foamCur = DAY_FOAM; washCur = DAY_WASH; wetCur = DAY_WET;
    } else if (nightLevel === 1) {

    } else {

      ];

        mixParsed(_PD.wetMid, _PN.wetMid, nightLevel),

        const [gx, gy] = glints[i];
        const phase = i * 0.91;
        const blink = Math.sin(t * 0.06 + phase);
        if (blink > 0.45) {
          const ax = sunX + gx + Math.floor(Math.sin(t * 0.025 + phase) * S);
          if (ax >= 0 && ax < W) {
            const col = blink > 0.88 ? '#FFF6CC' : (blink > 0.7 ? C.sun : '#F8D6A0');
            setFill(col); ctx.fillRect(ax, gy, S, S);
          }
        }
      }
      ctx.globalAlpha = 1;
    }

    if (nightLevel > 0.02) {
      ctx.globalAlpha = nightLevel;
      for (let py = 60*S; py < 78*S; py++) {
        const ratio = (py - 60*S) / (18*S);
        const halfW = Math.max(1, Math.floor(2*S * (1 - ratio * 0.5)));
        const wobble = Math.floor(Math.sin(t * 0.022 + py * 0.22) * 0.5 * S);
        let col;
        if (ratio < 0.20) col = '#E8E0C0';
        else if (ratio < 0.50) col = '#A89880';
        else if (ratio < 0.80) col = '#605880';
        else col = '#3A4068';
        setFill(col);
        for (let dx = -halfW - 1; dx <= halfW + 1; dx++) {
          const ax = moonX + dx + wobble;
          if (ax < 0 || ax >= W) continue;
          const intensity = 1 - Math.abs(dx) / (halfW + 1);
          if (intensity > 0.55 || intensity > TH(py, ax) * 0.8) {
            ctx.fillRect(ax, py, 1, 1);
          }
        }
      }
      const moonGlints = [[5*S,68*S],[-4*S,72*S],[6*S,75*S],[-5*S,78*S],[4*S,82*S]];
      for (let i = 0; i < moonGlints.length; i++) {
        const [gx, gy] = moonGlints[i];
        const phase = i * 1.13;
        const blink = Math.sin(t * 0.05 + phase);
        if (blink > 0.5) {
          const ax = moonX + gx + Math.floor(Math.sin(t * 0.02 + phase) * S);
          if (ax >= 0 && ax < W) {
            const col = blink > 0.85 ? '#E8E0C0' : '#9890A8';
            setFill(col); ctx.fillRect(ax, gy, 1, 1);
          }
        }
      }
      ctx.globalAlpha = 1;
    }

    updateBio();
    drawBio(nightLevel);
    drawJellies(nightLevel);

    const stripes = [
      {y: 68*S, basePeriod: 20*S, dash: 9*S,  scroll: 0.04*S},
      {y: 73*S, basePeriod: 26*S, dash: 13*S, scroll: 0.06*S},
      {y: 80*S, basePeriod: 32*S, dash: 17*S, scroll: 0.08*S},
      {y: 88*S, basePeriod: 40*S, dash: 22*S, scroll: 0.10*S},
      {y: 94*S, basePeriod: 48*S, dash: 28*S, scroll: 0.13*S}
    ];
    for (const s of stripes) {
      const off = Math.floor(t * s.scroll);
      for (let x = 0; x < W; x++) {
        if (Math.abs(x - sunX) <= 8*S && nightLevel < 0.5) continue;
        const absX = x + off;
        const dashIdx = Math.floor(absX / s.basePeriod);
        const lenVar = Math.sin(dashIdx * 2.7 + s.y * 0.15) * 8 * S + Math.cos(dashIdx * 1.3 + s.y * 0.25) * 5 * S;
        const actualDash = Math.max(3*S, Math.min(s.basePeriod - 3*S, s.dash + lenVar));
        const pos = ((absX % s.basePeriod) + s.basePeriod) % s.basePeriod;
        if (pos >= actualDash) continue;
        const visFactor = (Math.sin(dashIdx * 3.7 + s.y * 0.25 + t * 0.004) + 1) / 2;
        const visIntensity = 0.5 + visFactor * 0.5;
        const yWob = Math.round(Math.sin(x * 0.065 + t * 0.025 + s.y * 0.05) * 0.6 * S);
        const dy = s.y + yWob;
        const half = actualDash / 2;
        const dc = Math.abs(pos - half) / half;
        const intensity = (1 - dc) * visIntensity;
        const th = TH(dy, x);
        let col = null;
        if (intensity > 0.72) col = foamCur[0];
        else if (intensity > 0.50) col = foamCur[1];
        else if (intensity > 0.30) col = foamCur[2];
        else if (intensity > 0.15) col = foamCur[3];
        else if (intensity > th * 0.40) col = foamCur[4];
        if (col) { setFill(col); ctx.fillRect(x, dy, 1, 1); }
        if (intensity > 0.35 && TH(dy - 1, x) < 0.18) { setFill(foamCur[2]); ctx.fillRect(x, dy - 1, 1, 1); }
        if (intensity > 0.5 && TH(dy + 1, x + 7) < 0.13) { setFill(foamCur[3]); ctx.fillRect(x, dy + 1, 1, 1); }
      }
    }

    const waveCycle = Math.sin(t * 0.013);
    const advance = waveCycle * 2.0 * S;
    for (let x = 0; x < W; x++) {
      const sTopLarge = Math.sin(x * 0.014 + t * 0.017) * 2.0 * S;
      const sTopExtra = Math.sin(x * 0.0225 - t * 0.011 + 2.1) * 1.2 * S;
      const sTopMid = Math.sin(x * 0.045 + t * 0.022 + 0.6) * 0.8 * S;
      const sTopFine = Math.sin(x * 0.09 - t * 0.015 + 1.3) * 0.4 * S;
      const sTop = sTopLarge + sTopExtra + sTopMid + sTopFine;
      const sBot = Math.sin(x * 0.0225 + t * 0.018) * 1.5 * S + Math.sin(x * 0.055 - t * 0.013) * 0.7 * S;
      let topY = Math.floor(103*S + advance + sTop);
      let botY = Math.floor(110*S + advance + sBot);
      topY = Math.max(95*S, Math.min(109*S, topY));
      botY = Math.max(topY + 2*S, Math.min(114*S, botY));

      const foamHeightN = Math.sin(x * 0.025 + t * 0.013) * 1.6 + Math.sin(x * 0.055 - t * 0.009 + 1.3) * 1.0 + Math.sin(x * 0.105 + t * 0.011 + 2.7) * 0.6;
      const foamMaxRows = Math.max(2*S, Math.min(7*S, Math.floor(4.5*S + foamHeightN*S)));
      for (let dy = 1; dy <= foamMaxRows; dy++) {
        const ty = topY - dy;
        if (ty < 60*S) break;
        const relDepth = (dy - 1) / Math.max(1, foamMaxRows - 1);
        const density = 0.85 - relDepth * 0.70;
        if (density > TH(ty, x)) {
          let col;
          if (relDepth < 0.20) col = foamCur[1];
          else if (relDepth < 0.45) col = foamCur[2];
          else if (relDepth < 0.75) col = foamCur[3];
          else col = foamCur[4];
          setFill(col); ctx.fillRect(x, ty, 1, 1);
        }
      }
      const sprayN1 = Math.sin(x * 0.095 + t * 0.012 + 1.9) * 0.5;
      if (sprayN1 > 0.30) { const sy = topY - foamMaxRows - 1; if (sy >= 60*S && TH(sy, x) < 0.13) { setFill(foamCur[4]); ctx.fillRect(x, sy, 1, 1); } }
      const sprayN2 = Math.sin(x * 0.155 - t * 0.014 + 0.5) * 0.5;
      if (sprayN2 > 0.38) { const sy = topY - foamMaxRows - 2; if (sy >= 60*S && TH(sy, x) < 0.08) { setFill(foamCur[4]); ctx.fillRect(x, sy, 1, 1); } }

      // Pre-compute LUT row base for this x's y-range (saves multiply per pixel)
      // (Skipped — y varies, so we compute per pixel; still cheaper than 6 sin calls)
      for (let y = 96*S; y < SAND_Y; y++) {
        if (y < topY) continue;
        let col;
        if (y === topY) {
          const scallopT = Math.sin(x * 0.055 + t * 0.014 + 0.7) * 0.55 + Math.sin(x * 0.115 - t * 0.009 + 2.4) * 0.35;
          const th = TH(y, x);
          if (scallopT > 0.10) col = foamCur[0];
          else if (scallopT > -0.15) col = (th < 0.45) ? foamCur[0] : foamCur[1];
          else if (scallopT > -0.40) col = (th < 0.35) ? foamCur[1] : foamCur[2];
          else col = (th < 0.3) ? foamCur[3] : washCur[0];
        }
        else if (y < botY) {
          const range = Math.max(1, botY - topY);
          const r2 = (y - topY) / range;
          const washNoise = Math.sin(x * 0.045 + y * 0.075 + t * 0.005) * 0.32 + Math.sin(x * 0.11 - y * 0.06 + 1.7) * 0.22 + Math.sin(x * 0.17 + y * 0.13 + 3.3) * 0.13;
          const cIdx = Math.max(0, Math.min(washCur.length - 1.001, r2 * (washCur.length - 1) + washNoise));
          const idx = Math.floor(cIdx);
          const frac = cIdx - idx;
          const th = TH(y, x);
          col = (frac > th) ? washCur[Math.min(idx + 1, washCur.length - 1)] : washCur[idx];
        }
        else if (y === botY) {
          const scallopN = Math.sin(x * 0.065 + t * 0.012) * 0.55 + Math.sin(x * 0.135 - t * 0.008 + 1.7) * 0.35;
          const th = TH(y, x);
          if (scallopN > 0.15) col = foamCur[0];
          else if (scallopN > -0.10) col = (th < 0.5) ? foamCur[0] : foamCur[2];
          else if (scallopN > -0.35) col = (th < 0.4) ? foamCur[2] : foamCur[3];
          else {
            // LUT lookup replaces sandNoise + macroNoise per pixel
            const combined = wetNoiseLut[(y - WET_LUT_Y_MIN) * W + x];
            const gp = 1.4 + combined * 2.2;
            const clampedGp = Math.max(0, Math.min(3, gp));
            const idx = Math.floor(clampedGp);
            const frac = clampedGp - idx;
            col = (frac > th) ? wetCur[Math.min(3, idx + 1)] : wetCur[idx];
          }
        }
        else {
          // LUT lookup replaces sandNoise + macroNoise per pixel
          const combined = wetNoiseLut[(y - WET_LUT_Y_MIN) * W + x];
          const th = TH(y, x);
          const gp = 1.4 + combined * 2.2;
          const clampedGp = Math.max(0, Math.min(3, gp));
          const idx = Math.floor(clampedGp);
          const frac = clampedGp - idx;
          col = (frac > th) ? wetCur[Math.min(3, idx + 1)] : wetCur[idx];
        }
        setFill(col);
        ctx.fillRect(x, y, 1, 1);
      }
      if (botY > topY + 2*S) { const aN = Math.sin(x * 0.085 + t * 0.012 + 1.3) * 0.5; if (aN > 0.20 && TH(botY - 1, x) < 0.20) { setFill(foamCur[2]); ctx.fillRect(x, botY - 1, 1, 1); } }
      if (botY < 114*S) {
        const bN = Math.sin(x * 0.095 + t * 0.010 + 0.5) * 0.5;
        if (bN > 0.15 && TH(botY + 1, x) < 0.15) { setFill(foamCur[0]); ctx.fillRect(x, botY + 1, 1, 1); }
        if (botY < 113*S) { const cN = Math.sin(x * 0.115 - t * 0.008 + 2.3) * 0.5; if (cN > 0.32 && TH(botY + 2, x) < 0.10) { setFill(foamCur[0]); ctx.fillRect(x, botY + 2, 1, 1); } }
      }
    }

    drawDayNightOverlay(daySandCanvas, nightSandCanvas, SAND_Y);

    drawRocks();

    setFill('#6E4F45');
    ctx.fillRect(110*S, 134*S, S, S); ctx.fillRect(170*S, 133*S, 2*S, S);
    ctx.fillRect(60*S, 137*S, S, S); ctx.fillRect(185*S, 136*S, S, S);
    setFill('#F8E4D0');
    ctx.fillRect(95*S, 133*S, 2*S, S); ctx.fillRect(96*S, 134*S, S, S);
    setFill('#D9B498');
    ctx.fillRect(95*S, 134*S, S, S);

    updateCrabs(); drawCrabs();
    updateParticles(); drawParticles();

    t++;
    requestAnimationFrame(draw);
  }
  draw();
})();
</script></div>
</body>
