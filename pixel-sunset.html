<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="title" content="Pixel Sunset Beach">
<meta name="description" content="Animated pixel art beach scene with rolling waves, drifting clouds, birds, crabs, jellyfish, and bioluminescent ocean. Includes a day/night toggle that smoothly transitions the full scene.">
<meta name="category" content="Scenes">
<meta name="tags" content="pixel,beach,sunset,ocean,waves,day-night,canvas,animation,nature,clouds">
<title>Pixel Sunset Beach</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100vh;
    background: #0d0d14;
    overflow: hidden;
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
  }
  .scene-wrap {
    width: 100%; height: 100vh;
    position: relative;
  }
</style>
</head>
<body>
<div class="scene-wrap">
<div style="position: relative; width: 100%; height: 100vh;">
  <canvas id="beach" width="480" height="280"
    style="width: 100%; height: 100vh; image-rendering: pixelated; image-rendering: crisp-edges; display: block; object-fit: fill;">
  </canvas>
  <button id="dnToggle" aria-label="Toggle day and night" style="
    position: absolute; top: 16px; right: 16px;
    width: 44px; height: 44px;
    background: rgba(15, 22, 42, 0.72);
    border: 1.5px solid rgba(255, 250, 220, 0.45);
    border-radius: 50%;
    color: rgba(255, 235, 175, 0.95);
    font: 20px/1 system-ui, sans-serif;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    user-select: none; padding: 0;
    backdrop-filter: blur(6px);
    transition: background 0.4s, color 0.4s, transform 0.15s;
    z-index: 10;
  "><span id="dnIcon">☀</span></button>
</div>
<script>
(function() {
  const canvas = document.getElementById('beach');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const S = 2;
  const W = 240 * S, H = 140 * S;

  const C = {
    sky1:'#3F4F8F', sky2:'#5B5F9E', sky3:'#7F70AE', sky4:'#A77DB5',
    sky5:'#D89BBE', sky6:'#F2BFCB', sky7:'#F8D7C8',
    sun:'#FBE89E', sunCore:'#FFF6CC',
    oceanD:'#1A4C7E', oceanM:'#216898', oceanML:'#2A85B5', oceanL:'#3CA5D0',
    foam:'#FFFFFF', foamM:'#EFF7FB', foamS:'#D8EFF8', foamD:'#A8D0E5', foamE:'#82BFD8',
    washW:'#36C0D5', washM:'#66CEE0', washL:'#A0DBE8',
    wetDeep:'#8A5F48', wetMid:'#9E6E58', wetSand:'#B58270', wetDry:'#C99478',
    bird:'#3A2F4A'
  };

  const NIGHT = {
    foam:'#C0D4E8', foamM:'#A4B8D0', foamS:'#7888A8', foamD:'#4A6080', foamE:'#304664',
    washW:'#263858', washM:'#283450', washL:'#2A3048',
    wetDeep:'#2C2E42', wetMid:'#30323E', wetSand:'#353442', wetDry:'#3A3646'
  };

  // --- OPTIMIZED COLOR MIXING ---
  // Pre-parse all day/night hex constants once
  function parseHex(h) {
    return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
  }
  const _PD = { foam:parseHex(C.foam), foamM:parseHex(C.foamM), foamS:parseHex(C.foamS),
                foamD:parseHex(C.foamD), foamE:parseHex(C.foamE),
                washW:parseHex(C.washW), washM:parseHex(C.washM), washL:parseHex(C.washL),
                wetDeep:parseHex(C.wetDeep), wetMid:parseHex(C.wetMid),
                wetSand:parseHex(C.wetSand), wetDry:parseHex(C.wetDry) };
  const _PN = { foam:parseHex(NIGHT.foam), foamM:parseHex(NIGHT.foamM), foamS:parseHex(NIGHT.foamS),
                foamD:parseHex(NIGHT.foamD), foamE:parseHex(NIGHT.foamE),
                washW:parseHex(NIGHT.washW), washM:parseHex(NIGHT.washM), washL:parseHex(NIGHT.washL),
                wetDeep:parseHex(NIGHT.wetDeep), wetMid:parseHex(NIGHT.wetMid),
                wetSand:parseHex(NIGHT.wetSand), wetDry:parseHex(NIGHT.wetDry) };
  const _hex2 = (n) => (n < 16 ? '0' : '') + n.toString(16);
  function mixParsed(a, b, k) {
    return '#' +
      _hex2(Math.round(a[0] + (b[0]-a[0])*k)) +
      _hex2(Math.round(a[1] + (b[1]-a[1])*k)) +
      _hex2(Math.round(a[2] + (b[2]-a[2])*k));
  }
  // Pre-built endpoint arrays (referenced when nightLevel is exactly 0 or 1)
  const DAY_FOAM  = [C.foam, C.foamM, C.foamS, C.foamD, C.foamE];
  const NIGHT_FOAM = [NIGHT.foam, NIGHT.foamM, NIGHT.foamS, NIGHT.foamD, NIGHT.foamE];
  const DAY_WASH  = [C.washW, C.washM, C.washL];
  const NIGHT_WASH = [NIGHT.washW, NIGHT.washM, NIGHT.washL];
  const DAY_WET   = [C.wetDeep, C.wetMid, C.wetSand, C.wetDry];
  const NIGHT_WET  = [NIGHT.wetDeep, NIGHT.wetMid, NIGHT.wetSand, NIGHT.wetDry];

  // --- OPTIMIZED BAYER LOOKUP ---
  const _bayer = [[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]];
  const bayerFlat = new Float32Array(16);
  for (let i = 0; i < 4; i++) for (let j = 0; j < 4; j++) bayerFlat[(i<<2)|j] = (_bayer[i][j] + 0.5) / 16;
  const TH = (y, x) => bayerFlat[((y & 3) << 2) | (x & 3)];

  function sandNoise(x, y) {
    return Math.sin(x * 0.155 + y * 0.135 + 0.5) * 0.40
         + Math.sin(x * 0.065 - y * 0.205 + 1.2) * 0.30
         + Math.sin(x * 0.355 + y * 0.295 + 2.3) * 0.20
         + Math.sin(x * 0.565 - y * 0.415 + 3.4) * 0.15;
  }
  function macroNoise(x, y) {
    return Math.sin(x * 0.035 + y * 0.025 + 1.7) * 0.6
         + Math.sin(x * 0.020 - y * 0.030 + 0.3) * 0.5;
  }

  // --- OPTIMIZED FILLSTYLE CACHE ---
  let _curFill = null;
  function setFill(c) {
    if (c !== _curFill) { ctx.fillStyle = c; _curFill = c; }
  }

  let t = 0;
  let nightLevel = 0;
  let targetNight = 0;

  const button = document.getElementById('dnToggle');
  const icon = document.getElementById('dnIcon');
  button.addEventListener('click', () => {
    targetNight = 1 - targetNight;
    icon.textContent = targetNight ? '☾' : '☀';
    button.style.background = targetNight ? 'rgba(40, 35, 70, 0.75)' : 'rgba(15, 22, 42, 0.72)';
    button.style.color = targetNight ? 'rgba(220, 220, 245, 0.95)' : 'rgba(255, 235, 175, 0.95)';
  });
  button.addEventListener('mousedown', () => { button.style.transform = 'scale(0.92)'; });
  button.addEventListener('mouseup', () => { button.style.transform = 'scale(1)'; });
  button.addEventListener('mouseleave', () => { button.style.transform = 'scale(1)'; });

  // ── Tap interactions: crabs dig, ocean spawns shark fin ──
  canvas.addEventListener('pointerdown', e => {
    const rect = canvas.getBoundingClientRect();
    const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
    const cx = (e.clientX - rect.left) * sx;
    const cy = (e.clientY - rect.top) * sy;

    // Check clouds — tap to disperse like fog
    let handled = false;
    if (cy < 60 * S) {
      const dayL = 1 - nightLevel;
      const cloudSets = [
        { set: dayClouds,    visible: dayL > 0.15 },
        { set: dayFogClouds, visible: dayL > 0.15 },
        { set: nightClouds,    visible: nightLevel > 0.15 },
        { set: nightFogClouds, visible: nightLevel > 0.15 },
      ];
      outer: for (const { set, visible } of cloudSets) {
        if (!visible) continue;
        for (const cl of set) {
          if (cl.dispersing || cl.disperseHidden) continue;
          const cycle = W + cl.sprite.width;
          const xx = (((cl.offset + t * cl.speed) % cycle) + cycle) % cycle - cl.sprite.width;
          if (cx >= xx && cx <= xx + cl.sprite.width && cy >= cl.y && cy <= cl.y + cl.sprite.height) {
            cl.dispersing = true;
            cl.disperseStart = performance.now();
            handled = true;
            break outer;
          }
        }
      }
    }

    // Check crabs first
    for (const c of crabs) {
      if (c.digging) continue;
      if (cx >= c.x - 2*S && cx <= c.x + 7*S && cy >= c.y - 2*S && cy <= c.y + 5*S) {
        c.digging = true;
        c.digStart = performance.now();
        handled = true;
        break;
      }
    }

    // Check birds — tap to speed boost
    if (!handled) {
      for (const b of birds) {
        const bx = ((t * b.speed + b.extraPhase + b.phase) % (W + 40*S)) - 20*S;
        const hw = b.big ? 3*S : 2*S;
        if (cx >= bx - hw && cx <= bx + hw && cy >= b.base - 3*S && cy <= b.base + 3*S) {
          b.boostEnd = performance.now() + 2000;
          handled = true;
          break;
        }
      }
    }

    // Check rocks — tap to crumble
    if (!handled) {
      for (const rock of rocks) {
        if (rock.state !== 'solid') continue;
        const s = ROCKS[rock.type];
        const rw = s[0].length * S, rh = s.length * S;
        if (cx >= rock.x - S && cx <= rock.x + rw + S &&
            cy >= rock.y - S && cy <= rock.y + rh + S) {
          rock.state = 'crumbling';
          rock.stateStart = performance.now();
          rock.particles = buildRockParticles(rock.type, rock.x, rock.y);
          handled = true;
          break;
        }
      }
    }

    // Tap on ocean water → spawn shark fin
    if (!handled && cy >= 62 * S && cy <= 95 * S) {
      sharks.push({
        x: cx, y: cy,
        dir: Math.random() > 0.5 ? 1 : -1,
        start: performance.now(),
        speed: 0.35 * S
      });
    }

    e.preventDefault();
  });

  canvas.addEventListener('pointermove', e => {
    const rect = canvas.getBoundingClientRect();
    const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
    const cx = (e.clientX - rect.left) * sx;
    const cy = (e.clientY - rect.top) * sy;
    let found = -1;
    const jelCycle = W + JM * 2;
    for (let i = 0; i < jellies.length; i++) {
      const j = jellies[i];
      const depthRaw = Math.sin(t * j.depthRate + j.depthPhase);
      const depthCycle = Math.max(0, depthRaw);
      if (1 - Math.pow(depthCycle, 1.6) < 0.1) continue; // too deep to interact
      const bx = ((t * j.swimSX + j.phaseX) % jelCycle + jelCycle) % jelCycle - JM;
      const yOff = Math.sin(t * 0.014 + j.phase) * 3 * S;
      const xOff = Math.sin(t * 0.011 + j.phase * 1.3) * 2 * S;
      const depthY = depthCycle * 9 * S;
      const jx = bx + xOff, jy = j.baseY + yOff + depthY;
      const hitR = j.size === 'large' ? 10*S : j.size === 'tiny' ? 4*S : 7*S;
      const dx = cx - jx, dy = cy - jy;
      if (dx*dx + dy*dy < hitR*hitR) { found = i; break; }
    }
    jellyHoverIdx = found;
  });
  canvas.addEventListener('pointerleave', () => { jellyHoverIdx = -1; });

  function buildCloud(w, h, palette) {
    const c = document.createElement('canvas');
    c.width = w * 4 + 10; c.height = h * 4 + 10;
    const cc = c.getContext('2d');
    cc.imageSmoothingEnabled = false;
    const cx = c.width / 2, cy = c.height / 2;
    const blobs = [
      [0, 0, w, h * 0.9],
      [-w*0.8, h*0.3, w*0.7, h*0.5],
      [w*0.75, h*0.35, w*0.6, h*0.45],
      [-w*0.35, -h*0.55, w*0.55, h*0.5],
      [w*0.4, -h*0.5, w*0.5, h*0.45],
      [-w*0.1, h*0.5, w*0.45, h*0.4]
    ];
    let minY = Infinity, maxY = -Infinity;
    for (const [,dy,,ry] of blobs) {
      if (dy - ry < minY) minY = dy - ry;
      if (dy + ry > maxY) maxY = dy + ry;
    }
    const totalH = maxY - minY;
    const edgePad = Math.ceil(Math.max(w, h) * 0.5);
    for (let py = Math.floor(minY) - edgePad; py <= Math.ceil(maxY) + edgePad; py++) {
      for (let px = -Math.ceil(w * 1.8) - edgePad; px <= Math.ceil(w * 1.8) + edgePad; px++) {
        let minD = Infinity;
        for (const [dx,dy,rx,ry] of blobs) {
          const ex = (px-dx)/rx, ey = (py-dy)/ry;
          const d = ex*ex + ey*ey;
          if (d < minD) minD = d;
        }
        let density;
        if (minD <= 0.80) density = 1.0;
        else if (minD <= 1.00) density = 0.90 - (minD - 0.80) / 0.20 * 0.30;
        else if (minD <= 1.25) density = 0.48 - (minD - 1.00) / 0.25 * 0.35;
        else if (minD <= 1.55) density = 0.13 - (minD - 1.25) / 0.30 * 0.13;
        else continue;
        const ax = Math.floor(cx + px);
        const ay = Math.floor(cy + py);
        if (ax < 0 || ax >= c.width || ay < 0 || ay >= c.height) continue;
        const th = TH(ay, ax);
        if (density <= th) continue;
        const r = (py - minY) / totalH;
        let col;
        if (r < 0.18) col = palette[0];
        else if (r < 0.40) col = palette[1];
        else if (r < 0.62) col = palette[2];
        else if (r < 0.85) col = palette[3];
        else col = palette[4];
        cc.fillStyle = col;
        cc.fillRect(ax, ay, 1, 1);
      }
    }
    return c;
  }

  function buildFogCloud(w, h, palette) {
    const cw = Math.ceil(w * 3.5) + 10;
    const ch = Math.ceil(h * 3) + 4;
    const c = document.createElement('canvas');
    c.width = cw; c.height = ch;
    const cc = c.getContext('2d');
    cc.imageSmoothingEnabled = false;
    const cx = cw / 2, cy = ch / 2;
    const blobs = [
      [0, 0, w * 1.0, h * 0.5],
      [-w * 0.85, h * 0.15, w * 0.7, h * 0.35],
      [w * 0.85, h * 0.1, w * 0.7, h * 0.35],
      [-w * 0.4, -h * 0.3, w * 0.55, h * 0.3],
      [w * 0.45, -h * 0.25, w * 0.5, h * 0.28],
      [w * 0.1, h * 0.3, w * 0.4, h * 0.25]
    ];
    let minY = Infinity, maxY = -Infinity;
    for (const [,dy,,ry] of blobs) {
      if (dy - ry < minY) minY = dy - ry;
      if (dy + ry > maxY) maxY = dy + ry;
    }
    const totalH = maxY - minY;
    for (let py = Math.floor(minY) - 1; py <= Math.ceil(maxY) + 1; py++) {
      for (let px = -Math.ceil(w * 2); px <= Math.ceil(w * 2); px++) {
        let minD = Infinity;
        for (const [dx, dy, rx, ry] of blobs) {
          const ex = (px - dx) / rx, ey = (py - dy) / ry;
          const d = ex * ex + ey * ey;
          if (d < minD) minD = d;
        }
        let density;
        if (minD <= 0.6) density = 0.90;
        else if (minD <= 1.0) density = 0.55;
        else if (minD <= 1.5) density = 0.22;
        else if (minD <= 2.2) density = 0.08;
        else continue;
        const ax = Math.floor(cx + px);
        const ay = Math.floor(cy + py);
        if (ax < 0 || ax >= cw || ay < 0 || ay >= ch) continue;
        const th = TH(ay, ax);
        if (density > th) {
          const r = (py - minY) / totalH;
          let col;
          if (r < 0.3) col = palette[0];
          else if (r < 0.65) col = palette[1];
          else col = palette[2];
          cc.fillStyle = col;
          cc.fillRect(ax, ay, 1, 1);
        }
      }
    }
    return c;
  }

  function buildCloudMask(spriteCanvas) {
    const sCtx2 = spriteCanvas.getContext('2d');
    const data = sCtx2.getImageData(0, 0, spriteCanvas.width, spriteCanvas.height).data;
    const mask = new Uint8Array(spriteCanvas.width);
    for (let x = 0; x < spriteCanvas.width; x++) {
      for (let y = 0; y < spriteCanvas.height; y++) {
        const idx = (y * spriteCanvas.width + x) * 4;
        if (data[idx + 3] > 0) { mask[x] = 1; break; }
      }
    }
    return mask;
  }

  function buildGradientCanvas(width, height, yOffset, colors) {
    const c = document.createElement('canvas');
    c.width = width; c.height = height;
    const cc = c.getContext('2d');
    cc.imageSmoothingEnabled = false;
    for (let y = 0; y < height; y++) {
      const gp = (y / (height - 1)) * (colors.length - 1);
      const idx = Math.floor(gp);
      const frac = gp - idx;
      for (let x = 0; x < width; x++) {
        const th = TH(y + yOffset, x);
        const ci = (frac > th) ? Math.min(idx + 1, colors.length - 1) : idx;
        cc.fillStyle = colors[ci];
        cc.fillRect(x, y, 1, 1);
      }
    }
    return c;
  }

  function buildSandCanvas(colors, dampColors, yOffset, height) {
    const c = document.createElement('canvas');
    c.width = W; c.height = height;
    const cc = c.getContext('2d');
    cc.imageSmoothingEnabled = false;
    for (let y = 0; y < height; y++) {
      for (let x = 0; x < W; x++) {
        const globalY = y + yOffset;
        const baseGp = (y / (height - 1)) * (colors.length - 1);
        const noise = sandNoise(x, globalY);
        const gp = Math.max(0, Math.min(colors.length - 1.001, baseGp + noise * 0.7));
        const idx = Math.floor(gp);
        const frac = gp - idx;
        const th = TH(globalY, x);
        const ci = (frac > th) ? Math.min(idx + 1, colors.length - 1) : idx;
        cc.fillStyle = colors[ci];
        cc.fillRect(x, y, 1, 1);
      }
    }
    const dampRows = 9 * S;
    for (let y = 0; y < Math.min(dampRows, height); y++) {
      for (let x = 0; x < W; x++) {
        const globalY = y + yOffset;
        const fade = 1 - y / dampRows;
        const macN = macroNoise(x, globalY);
        const fineN = sandNoise(x, globalY) * 0.5;
        const dampIntensity = macN + fineN + fade * 0.5 - 0.2;
        const th = TH(globalY, x);
        let col = null;
        if (dampIntensity > 0.85 && th < 0.65) col = dampColors[0];
        else if (dampIntensity > 0.55 && th < 0.55) col = dampColors[1];
        else if (dampIntensity > 0.35 && th < 0.30 && fade > 0.3) col = dampColors[2];
        if (col) { cc.fillStyle = col; cc.fillRect(x, y, 1, 1); }
      }
    }
    return c;
  }

  const SKY_H = 60 * S;
  const sunX = 120 * S, sunY = 54 * S;
  const moonX = 200 * S, moonY = 16 * S;
  const daySkyColors = [C.sky1, C.sky2, C.sky3, C.sky4, C.sky5, C.sky6, C.sky7];
  const daySkyCanvas = buildGradientCanvas(W, SKY_H, 0, daySkyColors);
  const dsCtx = daySkyCanvas.getContext('2d');
  dsCtx.imageSmoothingEnabled = false;
  const haloColors = [C.sunCore, C.sun, '#FCE0BC', C.sky7, C.sky6];
  const haloRx = 28 * S, haloRy = 17 * S;
  for (let py = -haloRy; py <= haloRy; py++) {
    const ay = sunY + py;
    if (ay < 0 || ay >= SKY_H) continue;
    for (let px = -haloRx; px <= haloRx; px++) {
      const ax = sunX + px;
      if (ax < 0 || ax >= W) continue;
      const ex = px / haloRx, ey = py / haloRy;
      const d = Math.sqrt(ex*ex + ey*ey);
      if (d > 1) continue;
      const th = TH(ay, ax);
      if (d > 0.78) { const fade = (d - 0.78) / 0.22; if (fade > th) continue; }
      const dNorm = Math.min(d / 0.78, 1);
      const gp = dNorm * (haloColors.length - 1);
      const idx = Math.floor(gp);
      const frac = gp - idx;
      const ci = (frac > th) ? Math.min(idx + 1, haloColors.length - 1) : idx;
      dsCtx.fillStyle = haloColors[ci];
      dsCtx.fillRect(ax, ay, 1, 1);
    }
  }
  const sunRy = 7 * S, sunRx = 8 * S;
  for (let py = -sunRy; py <= sunRy; py++) {
    const ay = sunY + py;
    if (ay < 0 || ay >= SKY_H) continue;
    for (let px = -sunRx; px <= sunRx; px++) {
      const ax = sunX + px;
      if (ax < 0 || ax >= W) continue;
      const d = Math.sqrt((px*px)/((6*S)*(6*S)) + (py*py)/((5*S)*(5*S)));
      if (d > 1.3) continue;
      const th = TH(ay, ax);
      if (d <= 0.35) { dsCtx.fillStyle = C.sunCore; dsCtx.fillRect(ax, ay, 1, 1); }
      else if (d <= 0.55) { dsCtx.fillStyle = (th < 0.35) ? C.sunCore : C.sun; dsCtx.fillRect(ax, ay, 1, 1); }
      else if (d <= 0.85) { dsCtx.fillStyle = C.sun; dsCtx.fillRect(ax, ay, 1, 1); }
      else if (d <= 1.0) { if ((d - 0.85) / 0.15 < th) { dsCtx.fillStyle = C.sun; dsCtx.fillRect(ax, ay, 1, 1); } }
      else { if ((d - 1.0) / 0.3 < th * 0.55) { dsCtx.fillStyle = C.sun; dsCtx.fillRect(ax, ay, 1, 1); } }
    }
  }
  const nightSkyColors = ['#080C1E', '#0E1530', '#161F40', '#202A52', '#2C3868', '#3F4778', '#52507E'];
  const nightSkyCanvas = buildGradientCanvas(W, SKY_H, 0, nightSkyColors);
  const nsCtx = nightSkyCanvas.getContext('2d');
  nsCtx.imageSmoothingEnabled = false;
  const moonHaloColors = ['#F4ECD0', '#C0B8A0', '#7A7C9E', '#42467A', '#2C3868'];
  const moonHaloRx = 22 * S, moonHaloRy = 18 * S;
  for (let py = -moonHaloRy; py <= moonHaloRy; py++) {
    const ay = moonY + py;
    if (ay < 0 || ay >= SKY_H) continue;
    for (let px = -moonHaloRx; px <= moonHaloRx; px++) {
      const ax = moonX + px;
      if (ax < 0 || ax >= W) continue;

      }

      // Sand-puff: scattered pixels at dig site during entry/exit
      if (yOff > 0) {
        const peak = Math.min(yOff, 3*S - yOff) / (1.5 * S); // 0→1→0
        const sandCol = nightLevel > 0.5 ? '#6A6776' : '#C99478';
        setFill(sandCol);
        if (peak > 0.15 && TH(c.y - S, c.x + S)   < peak * 0.6) ctx.fillRect(c.x + S,   c.y - S, S, S);
        if (peak > 0.15 && TH(c.y - S, c.x + 3*S) < peak * 0.5) ctx.fillRect(c.x + 3*S, c.y - S, S, S);
        if (peak > 0.25 && TH(c.y,    c.x - S)    < peak * 0.4) ctx.fillRect(c.x - S,   c.y,     S, S);
        if (peak > 0.25 && TH(c.y,    c.x + 5*S)  < peak * 0.4) ctx.fillRect(c.x + 5*S, c.y,     S, S);
      }

      // Clip draw: shrink visible portion as crab sinks below sand surface
      const clipH = Math.max(0, 3 * S - yOff);
      if (clipH > 0) {
        ctx.save();
        ctx.beginPath();
        ctx.rect(c.x - S, c.y, 7 * S, clipH);
        ctx.clip();
        const x = c.x, y = c.y + yOff;
        setFill('#8C201A'); ctx.fillRect(x+S, y, S, S); ctx.fillRect(x+3*S, y, S, S);
        setFill('#C44434'); ctx.fillRect(x+2*S, y, S, S); ctx.fillRect(x, y+S, 5*S, S);
        setFill('#A02C24'); ctx.fillRect(x, y+S, S, S); ctx.fillRect(x+4*S, y+S, S, S);
        setFill('#8C201A');
        if (c.frame === 0) { ctx.fillRect(x, y+2*S, S, S); ctx.fillRect(x+2*S, y+2*S, S, S); ctx.fillRect(x+4*S, y+2*S, S, S); }
        else { ctx.fillRect(x+S, y+2*S, S, S); ctx.fillRect(x+3*S, y+2*S, S, S); }
        ctx.restore();
        _curFill = null; // resync cache after ctx.restore() reverts fillStyle
      }
    }
  }

  // ── Birds (persistent for tap interaction) ──
  const birds = [
    {speed: 0.13*S, base: 32*S, phase: 0, big: true, flap: 0.10, extraPhase: 0, extraFlap: 0, boostEnd: 0},
    {speed: 0.10*S, base: 40*S, phase: 90*S, big: true, flap: 0.08, extraPhase: 0, extraFlap: 0, boostEnd: 0},
    {speed: 0.16*S, base: 26*S, phase: 180*S, big: false, flap: 0.14, extraPhase: 0, extraFlap: 0, boostEnd: 0}
  ];

  // ── Shark fins (tap-spawned) ──
  const sharks = [];

  function updateSharks() {
    const now = performance.now();
    for (let i = sharks.length - 1; i >= 0; i--) {
      const s = sharks[i];
      if (now - s.start > 2000 || s.x < -10 * S || s.x > W + 10 * S) {
        sharks.splice(i, 1);
        continue;
      }
      s.x += s.dir * s.speed;
    }
  }

  function drawSharks() {
    const now = performance.now();
    for (const s of sharks) {
      const elapsed = now - s.start;

      // Fin emerges (0-250ms), cruises, then submerges (1750-2000ms)
      let fh; // visible fin rows (0..4)
      if (elapsed < 250) fh = Math.ceil((elapsed / 250) * 4);
      else if (elapsed > 1750) fh = Math.ceil(((2000 - elapsed) / 250) * 4);
      else fh = 4;
      if (fh <= 0) continue;

      const x = Math.floor(s.x);
      const yWob = Math.floor(Math.sin(elapsed * 0.003) * 0.5 * S);
      const y = Math.floor(s.y + yWob);
      const d = s.dir; // +1 right, -1 left

      // Fin palette (adapts to day/night)
      const dk  = nightLevel > 0.5 ? '#060A18' : '#141418';
      const mid = nightLevel > 0.5 ? '#101828' : '#222230';
      const hi  = nightLevel > 0.5 ? '#1C2438' : '#343444';

      // Compact dorsal fin — 4 rows tall, widens toward base, leans in swim dir
      //  Row 3 (tip):  1 px
      //  Row 2:        2 px
      //  Row 1:        3 px
      //  Row 0 (base): 4 px
      const px = (ox, oy, c) => { setFill(c); ctx.fillRect(x + ox * S, y - oy * S, S, S); };
      const od = d > 0 ? 1 : 0;

      if (fh >= 4) px(od, 3, dk);
      if (fh >= 3) { px(od, 2, dk); px(od + 1, 2, mid); }
      if (fh >= 2) { px(od - 1, 1, dk); px(od, 1, mid); px(od + 1, 1, hi); }
      if (fh >= 1) { px(od - 1, 0, dk); px(od, 0, dk); px(od + 1, 0, mid); px(od + 2, 0, hi); }

      // Small wake behind fin
      if (fh >= 2) {
        setFill(nightLevel > 0.5 ? '#304664' : '#D8EFF8');
        const wx = x - d * 3 * S;
        if (wx >= 0 && wx < W) ctx.fillRect(wx, y, S, S);
        if (fh >= 3) {
          const wx2 = x - d * 5 * S;
          if (wx2 >= 0 && wx2 < W && TH(y, wx2) < 0.35) ctx.fillRect(wx2, y, S, S);
        }
      }
    }
  }

  const particles = [];
  for (let i = 0; i < 12*S; i++) {
    particles.push({ x: Math.random()*W, y: 116*S + Math.random()*22*S, vx: (Math.random()-0.5)*0.15*S, vy: (-0.02+Math.random()*0.04)*S, age: Math.random()*100, maxAge: 80+Math.random()*60, sw: Math.random()*6.28 });
  }
  function updateParticles() {
    for (const p of particles) {
      p.x += p.vx + Math.sin(t * 0.04 + p.sw) * 0.05 * S;
      p.y += p.vy; p.age++;
      if (p.age > p.maxAge || p.x < 0 || p.x > W || p.y < 115*S || p.y > 138*S) {
        p.x = Math.random()*W; p.y = 116*S + Math.random()*22*S;
        p.vx = (Math.random()-0.5)*0.15*S; p.vy = (-0.02+Math.random()*0.04)*S;
        p.age = 0; p.maxAge = 80+Math.random()*60; p.sw = Math.random()*6.28;
      }
    }
  }
  function drawParticles() {
    for (const p of particles) {
      const lr = p.age / p.maxAge;
      let alpha;
      if (lr < 0.15) alpha = lr / 0.15;
      else if (lr > 0.85) alpha = (1 - lr) / 0.15;
      else alpha = 1;
      if (alpha < 0.3) continue;
      let col;
      if (alpha > 0.7) col = '#FFEDD8';
      else if (alpha > 0.4) col = '#F0D8B8';
      else col = '#D0B898';
      setFill(col);
      ctx.fillRect(Math.floor(p.x), Math.floor(p.y), S, S);
    }
  }

  function drawStars(alpha) {
    if (alpha <= 0.02) return;
    ctx.globalAlpha = alpha;
    for (const s of stars) {
      const tw = 0.65 + 0.35 * Math.sin(t * s.twinkSpeed + s.twinkPhase);
      const b = s.bright * tw;
      let col;
      if (b > 0.85) col = '#FFFFFF';
      else if (b > 0.62) col = '#E0E2FF';
      else if (b > 0.42) col = '#A0A4D0';
      else if (b > 0.22) col = '#6868A0';
      else continue;
      setFill(col);
      ctx.fillRect(s.x, s.y, 1, 1);
      if (b > 0.92 && s.bright > 0.75) {
        setFill('#9090C0');
        ctx.fillRect(s.x - 1, s.y, 1, 1);
        ctx.fillRect(s.x + 1, s.y, 1, 1);
        ctx.fillRect(s.x, s.y - 1, 1, 1);
        ctx.fillRect(s.x, s.y + 1, 1, 1);
      }
    }
    ctx.globalAlpha = 1;
  }

  function drawJellies(alpha) {
    if (alpha <= 0.02) return;
    const cycle = W + JM * 2;
    const baseAlpha = alpha * 0.65;

    for (let ji = 0; ji < jellies.length; ji++) {
      const j = jellies[ji];

      // ── Horizontal drift (wraps around canvas) ──
      const bx = ((t * j.swimSX + j.phaseX) % cycle + cycle) % cycle - JM;

      // ── Depth cycle: periodically dives deep, fading & sinking ──
      const depthRaw   = Math.sin(t * j.depthRate + j.depthPhase);
      const depthCycle = Math.max(0, depthRaw);           // 0=surface, 1=deep
      const depthAlpha = 1 - Math.pow(depthCycle, 1.6);   // fade as they sink
      if (depthAlpha < 0.03) continue;
      const depthY = depthCycle * 9 * S;                  // sink with depth

      const yOff = Math.sin(t * 0.014 + j.phase) * 3 * S;
      const xOff = Math.sin(t * 0.011 + j.phase * 1.3) * 2 * S;
      // ── Smooth hover ease-in / ease-out ──
      const hTarget = (ji === jellyHoverIdx) ? 1 : 0;
      jellyHoverT[ji] += (hTarget - jellyHoverT[ji]) * (hTarget > jellyHoverT[ji] ? 0.10 : 0.06);
      const hT = jellyHoverT[ji]; // 0 = idle, 1 = fully hovered

      const pulse = 0.7 + 0.30 * Math.sin(t * 0.04 + j.phase)
                  + hT * 0.15 * Math.sin(t * 0.06 + j.phase);

      const x = Math.floor(bx + xOff);
      const y = Math.floor(j.baseY + yOff + depthY);
      const effAlpha = baseAlpha * depthAlpha;

      // ── Colour palette ──
      let G, H, Cc, T, Halo;
      if      (j.color === 'cyan')   { G='#60D8C0'; H='#80F0D8'; Cc='#A8FFEC'; T='#60D8C0'; Halo='#388A78'; }
      else if (j.color === 'teal')   { G='#5078B8'; H='#70A0D0'; Cc='#A0D8F0'; T='#5078B8'; Halo='#28507A'; }
      else if (j.color === 'purple') { G='#6858C8'; H='#8878E0'; Cc='#AAAAFF'; T='#6858C8'; Halo='#322870'; }
      else                           { G='#B05888'; H='#D078A8'; Cc='#F0A0CC'; T='#B05888'; Halo='#601840'; }

      // ── Inner halo (smoothly expands and brightens on hover) ──
      const haloBase = j.size === 'large' ? 7*S : j.size === 'tiny' ? 3*S : 5*S;
      const haloR = Math.round(haloBase + hT * (9*S - haloBase));
      const glowPow = 0.55 + hT * 0.17;
      ctx.globalAlpha = effAlpha * (0.85 + hT * 0.25);
      setFill(Halo);
      for (let dy = -haloR; dy <= haloR; dy++) {
        for (let dx = -haloR - 1; dx <= haloR + 1; dx++) {
          const dd = Math.sqrt(dx*dx + dy*dy*1.4) / haloR;
          if (dd > 1.1) continue;
          const intensity = (1 - dd) * pulse * glowPow;
          const ay = y + dy, ax = x + dx;
          if (ay < 60*S || ay >= 96*S || ax < 0 || ax >= W) continue;
          if (intensity > TH(ay, ax) * 1.15) ctx.fillRect(ax, ay, 1, 1);
        }
      }

      // ── Outer aura ring (fades in and out with hover) ──
      if (hT > 0.01) {
        const auraR = 16*S;
        const auraCol = j.color==='cyan' ? '#1A5040' : j.color==='teal' ? '#102848'
                      : j.color==='purple' ? '#1A0840' : '#480C24';
        setFill(auraCol);
        ctx.globalAlpha = effAlpha * 0.50 * hT;
        for (let dy = -auraR; dy <= auraR; dy++) {
          for (let dx = -auraR - 2; dx <= auraR + 2; dx++) {
            const dd = Math.sqrt(dx*dx + dy*dy*1.4) / auraR;
            if (dd < 0.72 || dd > 1.08) continue;
            const intensity = (1 - Math.abs(dd - 0.90) / 0.18) * pulse * 0.38;
            const ay = y + dy, ax = x + dx;
            if (ay < 60*S || ay >= 96*S || ax < 0 || ax >= W) continue;
            if (intensity > TH(ay, ax) * 1.2) ctx.fillRect(ax, ay, 1, 1);
          }
        }
      }

      // ── Bell body & tentacles by size ──
      ctx.globalAlpha = effAlpha * (1 + hT * 0.15);

      if (j.size === 'tiny') {
        // 3-wide dome: [H Cc H] on top, [. G .] below
        setFill(H);  ctx.fillRect(x - S, y - S, S, S); ctx.fillRect(x + S, y - S, S, S);
        setFill(Cc); ctx.fillRect(x,     y - S, S, S);
        setFill(G);  ctx.fillRect(x,     y,     S, S);
        setFill(T);
        const sw = Math.round(Math.sin(t * 0.04 + j.phase) * 0.6);
        ctx.fillRect(x + sw*S, y + S, S, S);

      } else if (j.size === 'small') {
        // 5-wide dome
        const bellMap = ['.GHG.', 'GHCHG', '.HHH.'];
        for (let py = 0; py < bellMap.length; py++) {
          for (let px = 0; px < bellMap[py].length; px++) {
            const ch = bellMap[py][px]; if (ch === '.') continue;
            setFill(ch === 'G' ? G : ch === 'H' ? H : Cc);
            ctx.fillRect(x + (px-2)*S, y + (py-1)*S, S, S);
          }
        }
        setFill(T);
        const tentR = [[0,2,4],[1,3],[2]];
        for (let row = 0; row < tentR.length; row++) {
          const sway = Math.round(Math.sin(t * 0.03 + j.phase + row * 0.6) * 0.7);
          for (const bc of tentR[row]) ctx.fillRect(x + (bc + sway - 2)*S, y + (2+row)*S, S, S);
        }

      } else {
        // 7-wide dome (large)
        const bellMap = ['..GHG..', '.GHHHG.', 'GHHCHHG', '.HHHHH.'];
        for (let py = 0; py < bellMap.length; py++) {
          for (let px = 0; px < bellMap[py].length; px++) {
            const ch = bellMap[py][px]; if (ch === '.') continue;
            setFill(ch === 'G' ? G : ch === 'H' ? H : Cc);
            ctx.fillRect(x + (px-3)*S, y + (py-1)*S, S, S);
          }
        }
        setFill(T);
        const tentL = [[1,3,5],[0,2,4,6],[1,3,5],[2,4],[3]];
        for (let row = 0; row < tentL.length; row++) {
          const sway = Math.round(Math.sin(t * 0.025 + j.phase + row * 0.5) * 1.0);
          for (const bc of tentL[row]) ctx.fillRect(x + (bc + sway - 3)*S, y + (3+row)*S, S, S);
        }
      }
    }
    ctx.globalAlpha = 1;
  }

  function updateMiniJellies() {
    const now = performance.now();
    for (let i = miniJellies.length - 1; i >= 0; i--) {
      const m = miniJellies[i];
      if (now - m.birth >= m.life) { miniJellies.splice(i, 1); continue; }
      m.x += m.vx;
      m.y += m.vy;
      if (m.y < 63*S || m.y > 92*S) m.vy = -m.vy;
      if (m.x < 2 || m.x > W - 2) m.vx = -m.vx;
    }
  }

  function drawMiniJellies(alpha) {
    if (alpha <= 0.02 || miniJellies.length === 0) return;
    const now = performance.now();
    for (const m of miniJellies) {
      const age = now - m.birth;
      if (age >= m.life) continue;
      let fade;
      if (age < 600) fade = age / 600;
      else if (age > m.life - 600) fade = (m.life - age) / 600;
      else fade = 1;
      if (fade < 0.03) continue;

      const yWob = Math.sin(t * 0.018 + m.phase) * 1.5 * S;
      const xWob = Math.sin(t * 0.013 + m.phase * 1.4) * 0.8 * S;
      const x = Math.floor(m.x + xWob);
      const y = Math.floor(m.y + yWob);
      if (y < 61*S || y >= 96*S || x < 2 || x >= W - 2) continue;

      let G, H, Cc, T, Halo;
      if (m.color === 'cyan') { G = '#60D8C0'; H = '#80F0D8'; Cc = '#A8FFEC'; T = '#60D8C0'; Halo = '#388A78'; }
      else { G = '#5078B8'; H = '#70A0D0'; Cc = '#A0D8F0'; T = '#5078B8'; Halo = '#28507A'; }
      const pulse = 0.7 + 0.3 * Math.sin(t * 0.05 + m.phase);

      if (m.tiny) {
        // Tiny jelly: 3-pixel bell
        const haloR = 3 * S;
        ctx.globalAlpha = alpha * fade * 0.52;
        setFill(Halo);
        for (let dy = -haloR; dy <= haloR; dy++) {
          for (let dx = -haloR; dx <= haloR; dx++) {
            const dd = Math.sqrt(dx*dx + dy*dy*1.3) / haloR;
            if (dd > 1.0) continue;
            const intensity = (1 - dd) * pulse * 0.42;
            const ay = y + dy, ax = x + dx;
            if (ay < 61*S || ay >= 96*S || ax < 0 || ax >= W) continue;
            if (intensity > TH(ay, ax) * 1.1) ctx.fillRect(ax, ay, 1, 1);
          }
        }
        ctx.globalAlpha = alpha * fade * 0.62;
        setFill(H); ctx.fillRect(x - S, y, S, S); ctx.fillRect(x + S, y, S, S);
        setFill(Cc); ctx.fillRect(x, y, S, S);
        setFill(G); ctx.fillRect(x, y + S, S, S);
        setFill(T);
        const sw = Math.round(Math.sin(t * 0.04 + m.phase) * 0.5);
        ctx.fillRect(x + sw*S, y + 2*S, S, S);
      } else {
        // Small jelly: full bell map, same proportions as main
        const haloR = 4 * S;
        ctx.globalAlpha = alpha * fade * 0.55;
        setFill(Halo);
        for (let dy = -haloR; dy <= haloR; dy++) {
          for (let dx = -haloR - 1; dx <= haloR + 1; dx++) {
            const dd = Math.sqrt(dx*dx + dy*dy*1.4) / haloR;
            if (dd > 1.1) continue;
            const intensity = (1 - dd) * pulse * 0.46;
            const ay = y + dy, ax = x + dx;
            if (ay < 61*S || ay >= 96*S || ax < 0 || ax >= W) continue;
            if (intensity > TH(ay, ax) * 1.15) ctx.fillRect(ax, ay, 1, 1);
          }
        }
        ctx.globalAlpha = alpha * fade * 0.68;
        const bellMap = ['.GHG.', 'GHCHG', '.HHH.'];
        for (let py = 0; py < bellMap.length; py++) {
          for (let px = 0; px < bellMap[py].length; px++) {
            const ch = bellMap[py][px];
            let col;
            if (ch === 'G') col = G; else if (ch === 'H') col = H;
            else if (ch === 'C') col = Cc; else continue;
            setFill(col);
            ctx.fillRect(x + (px-2)*S, y + (py-1)*S, S, S);
          }
        }
        setFill(T);
        const tentacleRows = [[0, 2, 4], [1, 3], [2]];
        for (let row = 0; row < tentacleRows.length; row++) {
          const sway = Math.round(Math.sin(t * 0.03 + m.phase + row * 0.6) * 0.7);
          for (const bc of tentacleRows[row]) {
            ctx.fillRect(x + (bc + sway - 2)*S, y + (2 + row)*S, S, S);
          }
        }
      }
    }
    ctx.globalAlpha = 1;
  }

  function drawDayNightOverlay(dayCanvas, nightCanvas, y) {
    if (nightLevel === 0) {
      ctx.drawImage(dayCanvas, 0, y);
    } else if (nightLevel === 1) {
      ctx.drawImage(nightCanvas, 0, y);
    } else {
      ctx.drawImage(dayCanvas, 0, y);
      ctx.globalAlpha = nightLevel;
      ctx.drawImage(nightCanvas, 0, y);
      ctx.globalAlpha = 1;
    }
  }

  function draw() {
    if (nightLevel < targetNight) nightLevel = Math.min(targetNight, nightLevel + 0.012);
    else if (nightLevel > targetNight) nightLevel = Math.max(targetNight, nightLevel - 0.012);
    const dayLevel = 1 - nightLevel;

    // --- OPTIMIZED PALETTE COMPUTATION ---
    let foamCur, washCur, wetCur;
    if (nightLevel === 0) {
      foamCur = DAY_FOAM; washCur = DAY_WASH; wetCur = DAY_WET;
    } else if (nightLevel === 1) {
      foamCur = NIGHT_FOAM; washCur = NIGHT_WASH; wetCur = NIGHT_WET;
    } else {
      foamCur = [
        mixParsed(_PD.foam, _PN.foam, nightLevel),
        mixParsed(_PD.foamM, _PN.foamM, nightLevel),
        mixParsed(_PD.foamS, _PN.foamS, nightLevel),
        mixParsed(_PD.foamD, _PN.foamD, nightLevel),
        mixParsed(_PD.foamE, _PN.foamE, nightLevel)
      ];
      washCur = [
        mixParsed(_PD.washW, _PN.washW, nightLevel),
        mixParsed(_PD.washM, _PN.washM, nightLevel),
        mixParsed(_PD.washL, _PN.washL, nightLevel)
      ];
      wetCur = [
        mixParsed(_PD.wetDeep, _PN.wetDeep, nightLevel),
        mixParsed(_PD.wetMid, _PN.wetMid, nightLevel),
        mixParsed(_PD.wetSand, _PN.wetSand, nightLevel),
        mixParsed(_PD.wetDry, _PN.wetDry, nightLevel)
      ];
    }

    // Invalidate fillStyle cache at start of frame (defensive against external state changes)
    _curFill = null;

    drawDayNightOverlay(daySkyCanvas, nightSkyCanvas, 0);
    drawStars(nightLevel);

    const cloudNow = performance.now();
    function drawCloudLayer(set, alpha) {
      if (alpha <= 0.02) return;
      for (const cl of set) {
        const cycle = W + cl.sprite.width;
        const xx = (((cl.offset + t * cl.speed) % cycle) + cycle) % cycle - cl.sprite.width;
        const bx = Math.floor(xx);

        // Respawn after full disperse → trigger appear animation
        if (cl.disperseHidden) {
          if (cloudNow >= cl.respawnAt) {
            cl.disperseHidden = false;
            cl.appearing = true;
            cl.appearStart = cloudNow;
          } else continue;
        }

        // ── Appear animation (reverse fog-gather) ──
        if (cl.appearing) {
          const elapsed = cloudNow - cl.appearStart;
          const dur = 950;
          const prog = Math.min(1, elapsed / dur);
          if (prog >= 1) {
            cl.appearing = false;
            // fall through to normal draw below
          } else {
            const ease = prog * (2 - prog); // ease-out
            const spread = (1 - ease) * 14 * S; // wisps start spread, converge inward
            const wisps = [
              { dx: 0,              dy: -(1 - ease) * 4, a: Math.pow(prog, 0.75) },
              { dx:  spread * 0.55, dy: -(1 - ease) * 2, a: Math.pow(prog, 1.4) * 0.65 },
              { dx: -spread * 0.50, dy: -(1 - ease) * 3, a: Math.pow(prog, 1.4) * 0.60 },
              { dx:  spread * 0.20, dy:  (1 - ease) * 3,  a: Math.pow(prog, 2.0) * 0.40 },
            ];
            for (const w of wisps) {
              ctx.globalAlpha = w.a * alpha;
              ctx.drawImage(cl.sprite, bx + w.dx, cl.y + w.dy);
            }
            continue;
          }
        }

        // ── Disperse animation (tap → fog dissolve) ──
        if (!cl.dispersing) {
          ctx.globalAlpha = alpha;
          ctx.drawImage(cl.sprite, bx, cl.y);
        } else {
          const elapsed = cloudNow - cl.disperseStart;
          const dur = 1100;
          const prog = Math.min(1, elapsed / dur);
          if (prog >= 1) {
            cl.dispersing = false;
            cl.disperseHidden = true;
            cl.respawnAt = cloudNow + 6000 + Math.random() * 6000;
            continue;
          }
          // ease-out curve — fast start, slow fade at end
          const ease = prog * (2 - prog);
          const spread = ease * 14 * S;
          const wisps = [
            { dx: 0,              dy: -ease * 4,       a: Math.pow(1 - prog, 0.75) },
            { dx:  spread * 0.55, dy: -ease * 2,       a: Math.pow(1 - prog, 1.4) * 0.65 },
            { dx: -spread * 0.50, dy: -ease * 3,       a: Math.pow(1 - prog, 1.4) * 0.60 },
            { dx:  spread * 0.20, dy:  ease * 3,       a: Math.pow(1 - prog, 2.0) * 0.40 },
          ];
          for (const w of wisps) {
            ctx.globalAlpha = w.a * alpha;
            ctx.drawImage(cl.sprite, bx + w.dx, cl.y + w.dy);
          }
        }
      }
      ctx.globalAlpha = 1;
    }
    drawCloudLayer(dayFogClouds, dayLevel);
    drawCloudLayer(nightFogClouds, nightLevel);
    drawCloudLayer(dayClouds, dayLevel);
    drawCloudLayer(nightClouds, nightLevel);

    const birdNow = performance.now();
    for (const b of birds) {
      if (birdNow < b.boostEnd) {
        b.extraPhase += b.speed * 0.4;
        b.extraFlap += b.flap * 0.5;
      }
      const bx = ((t * b.speed + b.extraPhase + b.phase) % (W + 40*S)) - 20*S;
      const f = Math.floor((t * b.flap + b.extraFlap + b.phase * 0.05) % (b.big ? 3 : 2));
      drawBird(bx, b.base, f, b.big);
    }

    drawDayNightOverlay(dayOceanCanvas, nightOceanCanvas, 60*S);

    // Cloud reflections — use pre-built combined array (no per-frame spread)
    const reflAll = nightLevel > 0.5 ? nightAllClouds : dayAllClouds;
    const reflCol = nightLevel > 0.5 ? '#2A3050' : '#5F567A';
    setFill(reflCol);
    for (const cl of reflAll) {
      if (cl.disperseHidden || cl.dispersing) continue;
      const cycle = W + cl.sprite.width;
      const xx = Math.floor((((cl.offset + t * cl.speed) % cycle) + cycle) % cycle - cl.sprite.width);
      for (let sx = 0; sx < cl.mask.length; sx++) {
        if (!cl.mask[sx]) continue;
        const baseX = xx + sx;
        for (let dy = 0; dy < 7*S; dy++) {
          const y = 60*S + dy;
          const fade = (7*S - dy) / (7*S);
          const wobble = Math.floor(Math.sin(t * 0.04 + y * 0.3 + baseX * 0.02) * 1.5 * S + Math.sin(t * 0.03 - y * 0.15 + baseX * 0.01) * 0.7 * S);
          const ax = baseX + wobble;
          if (ax < 0 || ax >= W) continue;
          if (Math.abs(ax - sunX) <= 12*S && nightLevel < 0.5) continue;
          if (Math.abs(ax - moonX) <= 4*S && nightLevel > 0.5) continue;
          const density = 0.10 * fade;
          if (density > TH(y, ax)) {
            ctx.fillRect(ax, y, 1, 1);
          }
        }
      }
    }

    if (dayLevel > 0.02) {
      ctx.globalAlpha = dayLevel;
      for (let py = 60*S; py < 67*S; py++) {
        const ratio = (py - 60*S) / (7*S);
        const halfW = Math.floor(6*S * (1 - ratio * 0.15));
        const wobble = Math.floor(Math.sin(t * 0.025 + py * 0.25) * 0.6 * S);
        let col;
        if (py < 62*S) col = '#FFF6CC';
        else if (py < 64*S) col = C.sunCore;
        else if (py < 66*S) col = C.sun;
        else col = '#FBE89E';
        reflectionRow(sunX + wobble, py, halfW, col, 0.4);
      }
      const shimmer = [[69*S,5*S,0.4,'#FBE89E'],[72*S,4*S,2.0,'#F8D6A0'],[75*S,5*S,1.1,'#F8D6A0'],[78*S,3*S,3.5,'#F0C088'],[82*S,4*S,2.6,'#F0C088'],[85*S,3*S,4.8,'#E8AC88'],[89*S,2*S,1.5,'#E8AC88'],[93*S,2*S,3.2,'#D89878']];
      for (const [py, w, phase, col] of shimmer) {
        const wobble = Math.floor(Math.sin(t * 0.035 + phase) * 2 * S);
        const wMod = Math.floor(Math.sin(t * 0.025 + phase * 0.6) * 1.5 * S);
        const halfW = Math.max(S, w + wMod);
        reflectionRow(sunX + wobble, py, halfW, col, 0.5);
        if (Math.sin(t * 0.02 + phase * 1.3) > 0.2) {
          const sx2 = sunX + wobble + halfW + 4*S + Math.floor(Math.sin(phase) * 2 * S);
          if (sx2 >= 0 && sx2 < W) { setFill(col); ctx.fillRect(sx2, py, 1, 1); if (TH(py, sx2 + 1) < 0.3) ctx.fillRect(sx2 + 1, py, 1, 1); }
        }
        if (Math.cos(t * 0.02 + phase * 0.8) > 0.3) {
          const sx2 = sunX + wobble - halfW - 4*S + Math.floor(Math.cos(phase) * 2 * S);
          if (sx2 >= 0 && sx2 < W) { setFill(col); ctx.fillRect(sx2, py, 1, 1); if (TH(py, sx2 - 1) < 0.3) ctx.fillRect(sx2 - 1, py, 1, 1); }
        }
      }
      const glints = [[13*S,67*S],[-12*S,70*S],[14*S,73*S],[-13*S,76*S],[12*S,80*S],[-14*S,83*S],[13*S,86*S],[-11*S,90*S],[10*S,93*S]];
      for (let i = 0; i < glints.length; i++) {
        const [gx, gy] = glints[i];
        const phase = i * 0.91;
        const blink = Math.sin(t * 0.06 + phase);
        if (blink > 0.45) {
          const ax = sunX + gx + Math.floor(Math.sin(t * 0.025 + phase) * S);
          if (ax >= 0 && ax < W) {
            const col = blink > 0.88 ? '#FFF6CC' : (blink > 0.7 ? C.sun : '#F8D6A0');
            setFill(col); ctx.fillRect(ax, gy, S, S);
          }
        }
      }
      ctx.globalAlpha = 1;
    }

    if (nightLevel > 0.02) {
      ctx.globalAlpha = nightLevel;
      for (let py = 60*S; py < 78*S; py++) {
        const ratio = (py - 60*S) / (18*S);
        const halfW = Math.max(1, Math.floor(2*S * (1 - ratio * 0.5)));
        const wobble = Math.floor(Math.sin(t * 0.022 + py * 0.22) * 0.5 * S);
        let col;
        if (ratio < 0.20) col = '#E8E0C0';
        else if (ratio < 0.50) col = '#A89880';
        else if (ratio < 0.80) col = '#605880';
        else col = '#3A4068';
        setFill(col);
        for (let dx = -halfW - 1; dx <= halfW + 1; dx++) {
          const ax = moonX + dx + wobble;
          if (ax < 0 || ax >= W) continue;
          const intensity = 1 - Math.abs(dx) / (halfW + 1);
          if (intensity > 0.55 || intensity > TH(py, ax) * 0.8) {
            ctx.fillRect(ax, py, 1, 1);
          }
        }
      }
      const moonGlints = [[5*S,68*S],[-4*S,72*S],[6*S,75*S],[-5*S,78*S],[4*S,82*S]];
      for (let i = 0; i < moonGlints.length; i++) {
        const [gx, gy] = moonGlints[i];
        const phase = i * 1.13;
        const blink = Math.sin(t * 0.05 + phase);
        if (blink > 0.5) {
          const ax = moonX + gx + Math.floor(Math.sin(t * 0.02 + phase) * S);
          if (ax >= 0 && ax < W) {
            const col = blink > 0.85 ? '#E8E0C0' : '#9890A8';
            setFill(col); ctx.fillRect(ax, gy, 1, 1);
          }
        }
      }
      ctx.globalAlpha = 1;
    }

    updateBio();
    drawBio(nightLevel);
    drawJellies(nightLevel);
    updateMiniJellies();
    drawMiniJellies(nightLevel);

    const stripes = [
      {y: 68*S, basePeriod: 20*S, dash: 9*S,  scroll: 0.04*S},
      {y: 73*S, basePeriod: 26*S, dash: 13*S, scroll: 0.06*S},
      {y: 80*S, basePeriod: 32*S, dash: 17*S, scroll: 0.08*S},
      {y: 88*S, basePeriod: 40*S, dash: 22*S, scroll: 0.10*S},
      {y: 94*S, basePeriod: 48*S, dash: 28*S, scroll: 0.13*S}
    ];
    for (const s of stripes) {
      const off = Math.floor(t * s.scroll);
      for (let x = 0; x < W; x++) {
        if (Math.abs(x - sunX) <= 8*S && nightLevel < 0.5) continue;
        const absX = x + off;
        const dashIdx = Math.floor(absX / s.basePeriod);
        const lenVar = Math.sin(dashIdx * 2.7 + s.y * 0.15) * 8 * S + Math.cos(dashIdx * 1.3 + s.y * 0.25) * 5 * S;
        const actualDash = Math.max(3*S, Math.min(s.basePeriod - 3*S, s.dash + lenVar));
        const pos = ((absX % s.basePeriod) + s.basePeriod) % s.basePeriod;
        if (pos >= actualDash) continue;
        const visFactor = (Math.sin(dashIdx * 3.7 + s.y * 0.25 + t * 0.004) + 1) / 2;
        const visIntensity = 0.5 + visFactor * 0.5;
        const yWob = Math.round(Math.sin(x * 0.065 + t * 0.025 + s.y * 0.05) * 0.6 * S);
        const dy = s.y + yWob;
        const half = actualDash / 2;
        const dc = Math.abs(pos - half) / half;
        const intensity = (1 - dc) * visIntensity;
        const th = TH(dy, x);
        let col = null;
        if (intensity > 0.72) col = foamCur[0];
        else if (intensity > 0.50) col = foamCur[1];
        else if (intensity > 0.30) col = foamCur[2];
        else if (intensity > 0.15) col = foamCur[3];
        else if (intensity > th * 0.40) col = foamCur[4];
        if (col) { setFill(col); ctx.fillRect(x, dy, 1, 1); }
        if (intensity > 0.35 && TH(dy - 1, x) < 0.18) { setFill(foamCur[2]); ctx.fillRect(x, dy - 1, 1, 1); }
        if (intensity > 0.5 && TH(dy + 1, x + 7) < 0.13) { setFill(foamCur[3]); ctx.fillRect(x, dy + 1, 1, 1); }
      }
    }

    const waveCycle = Math.sin(t * 0.013);
    const advance = waveCycle * 2.0 * S;
    for (let x = 0; x < W; x++) {
      const sTopLarge = Math.sin(x * 0.014 + t * 0.017) * 2.0 * S;
      const sTopExtra = Math.sin(x * 0.0225 - t * 0.011 + 2.1) * 1.2 * S;
      const sTopMid = Math.sin(x * 0.045 + t * 0.022 + 0.6) * 0.8 * S;
      const sTopFine = Math.sin(x * 0.09 - t * 0.015 + 1.3) * 0.4 * S;
      const sTop = sTopLarge + sTopExtra + sTopMid + sTopFine;
      const sBot = Math.sin(x * 0.0225 + t * 0.018) * 1.5 * S + Math.sin(x * 0.055 - t * 0.013) * 0.7 * S;
      let topY = Math.floor(103*S + advance + sTop);
      let botY = Math.floor(110*S + advance + sBot);
      topY = Math.max(95*S, Math.min(109*S, topY));
      botY = Math.max(topY + 2*S, Math.min(114*S, botY));

      const foamHeightN = Math.sin(x * 0.025 + t * 0.013) * 1.6 + Math.sin(x * 0.055 - t * 0.009 + 1.3) * 1.0 + Math.sin(x * 0.105 + t * 0.011 + 2.7) * 0.6;
      const foamMaxRows = Math.max(2*S, Math.min(7*S, Math.floor(4.5*S + foamHeightN*S)));
      for (let dy = 1; dy <= foamMaxRows; dy++) {
        const ty = topY - dy;
        if (ty < 60*S) break;
        const relDepth = (dy - 1) / Math.max(1, foamMaxRows - 1);
        const density = 0.85 - relDepth * 0.70;
        if (density > TH(ty, x)) {
          let col;
          if (relDepth < 0.20) col = foamCur[1];
          else if (relDepth < 0.45) col = foamCur[2];
          else if (relDepth < 0.75) col = foamCur[3];
          else col = foamCur[4];
          setFill(col); ctx.fillRect(x, ty, 1, 1);
        }
      }
      const sprayN1 = Math.sin(x * 0.095 + t * 0.012 + 1.9) * 0.5;
      if (sprayN1 > 0.30) { const sy = topY - foamMaxRows - 1; if (sy >= 60*S && TH(sy, x) < 0.13) { setFill(foamCur[4]); ctx.fillRect(x, sy, 1, 1); } }
      const sprayN2 = Math.sin(x * 0.155 - t * 0.014 + 0.5) * 0.5;
      if (sprayN2 > 0.38) { const sy = topY - foamMaxRows - 2; if (sy >= 60*S && TH(sy, x) < 0.08) { setFill(foamCur[4]); ctx.fillRect(x, sy, 1, 1); } }

      // Pre-compute LUT row base for this x's y-range (saves multiply per pixel)
      // (Skipped — y varies, so we compute per pixel; still cheaper than 6 sin calls)
      for (let y = 96*S; y < SAND_Y; y++) {
        if (y < topY) continue;
        let col;
        if (y === topY) {
          const scallopT = Math.sin(x * 0.055 + t * 0.014 + 0.7) * 0.55 + Math.sin(x * 0.115 - t * 0.009 + 2.4) * 0.35;
          const th = TH(y, x);
          if (scallopT > 0.10) col = foamCur[0];
          else if (scallopT > -0.15) col = (th < 0.45) ? foamCur[0] : foamCur[1];
          else if (scallopT > -0.40) col = (th < 0.35) ? foamCur[1] : foamCur[2];
          else col = (th < 0.3) ? foamCur[3] : washCur[0];
        }
        else if (y < botY) {
          const range = Math.max(1, botY - topY);
          const r2 = (y - topY) / range;
          const washNoise = Math.sin(x * 0.045 + y * 0.075 + t * 0.005) * 0.32 + Math.sin(x * 0.11 - y * 0.06 + 1.7) * 0.22 + Math.sin(x * 0.17 + y * 0.13 + 3.3) * 0.13;
          const cIdx = Math.max(0, Math.min(washCur.length - 1.001, r2 * (washCur.length - 1) + washNoise));
          const idx = Math.floor(cIdx);
          const frac = cIdx - idx;
          const th = TH(y, x);
          col = (frac > th) ? washCur[Math.min(idx + 1, washCur.length - 1)] : washCur[idx];
        }
        else if (y === botY) {
          const scallopN = Math.sin(x * 0.065 + t * 0.012) * 0.55 + Math.sin(x * 0.135 - t * 0.008 + 1.7) * 0.35;
          const th = TH(y, x);
          if (scallopN > 0.15) col = foamCur[0];
          else if (scallopN > -0.10) col = (th < 0.5) ? foamCur[0] : foamCur[2];
          else if (scallopN > -0.35) col = (th < 0.4) ? foamCur[2] : foamCur[3];
          else {
            // LUT lookup replaces sandNoise + macroNoise per pixel
            const combined = wetNoiseLut[(y - WET_LUT_Y_MIN) * W + x];
            const gp = 1.4 + combined * 2.2;
            const clampedGp = Math.max(0, Math.min(3, gp));
            const idx = Math.floor(clampedGp);
            const frac = clampedGp - idx;
            col = (frac > th) ? wetCur[Math.min(3, idx + 1)] : wetCur[idx];
          }
        }
        else {
          // LUT lookup replaces sandNoise + macroNoise per pixel
          const combined = wetNoiseLut[(y - WET_LUT_Y_MIN) * W + x];
          const th = TH(y, x);
          const gp = 1.4 + combined * 2.2;
          const clampedGp = Math.max(0, Math.min(3, gp));
          const idx = Math.floor(clampedGp);
          const frac = clampedGp - idx;
          col = (frac > th) ? wetCur[Math.min(3, idx + 1)] : wetCur[idx];
        }
        setFill(col);
        ctx.fillRect(x, y, 1, 1);
      }
      if (botY > topY + 2*S) { const aN = Math.sin(x * 0.085 + t * 0.012 + 1.3) * 0.5; if (aN > 0.20 && TH(botY - 1, x) < 0.20) { setFill(foamCur[2]); ctx.fillRect(x, botY - 1, 1, 1); } }
      if (botY < 114*S) {
        const bN = Math.sin(x * 0.095 + t * 0.010 + 0.5) * 0.5;
        if (bN > 0.15 && TH(botY + 1, x) < 0.15) { setFill(foamCur[0]); ctx.fillRect(x, botY + 1, 1, 1); }
        if (botY < 113*S) { const cN = Math.sin(x * 0.115 - t * 0.008 + 2.3) * 0.5; if (cN > 0.32 && TH(botY + 2, x) < 0.10) { setFill(foamCur[0]); ctx.fillRect(x, botY + 2, 1, 1); } }
      }
    }

    // Sharks drawn AFTER all ocean stripes/waves so the fin isn't overwritten
    updateSharks();
    drawSharks();

    drawDayNightOverlay(daySandCanvas, nightSandCanvas, SAND_Y);

    drawRocks();

    setFill('#6E4F45');
    ctx.fillRect(110*S, 134*S, S, S); ctx.fillRect(170*S, 133*S, 2*S, S);
    ctx.fillRect(60*S, 137*S, S, S); ctx.fillRect(185*S, 136*S, S, S);
    setFill('#F8E4D0');
    ctx.fillRect(95*S, 133*S, 2*S, S); ctx.fillRect(96*S, 134*S, S, S);
    setFill('#D9B498');
    ctx.fillRect(95*S, 134*S, S, S);

    updateCrabs(); drawCrabs();
    updateParticles(); drawParticles();

    t++;
    requestAnimationFrame(draw);
  }
  draw();
})();
</script></div>
</body>
</html>
