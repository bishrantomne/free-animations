<!doctype html><html><head><meta charset="utf-8"><style>
      html,body{margin:0;height:100%}
      body{display:grid;place-items:center;background:#0d0b0a;font-family:system-ui,sans-serif}
      button{
        padding:14px 32px;
        background:#1a181c;
        color:#f5f1e8;
        border:1px solid #2c2a2f;
        border-radius:8px;
        font-size:14px;
        cursor:pointer;
        transition:background .2s, border-color .2s, color .2s;
      }
      button:hover{
        background:#252328;
        border-color:#f2ff00;
        color:#f2ff00;
      }
    </style></head><body>
      <button>Hover Me</button>
    </body></html>
